<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Contatos do Professor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        /* Garante rolagem suave se a tela for muito pequena na altura */
        .content-area {
            min-height: 0; 
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden bg-[#f5f8fa]">
    
    <div class="flex flex-col h-full w-full relative">
        
        <div class="h-24 shrink-0 bg-white flex items-center px-6 md:px-12 border-b border-gray-200 shadow-sm z-20 justify-between">
            <div class="flex-1">
                <p class="text-[#3DDC84] font-bold uppercase tracking-widest text-xs md:text-sm mb-1">Fim da Aula</p>
                <h1 class="text-2xl md:text-4xl font-black text-[#073042]">Dúvidas e Contato</h1>
            </div>
            <div class="hidden md:block bg-[#e6fcf0] px-6 py-2 rounded-full border border-[#b8eac9]">
                <p class="text-[#00a040] font-bold text-lg"><i class="fas fa-comments mr-2"></i>Fale Comigo</p>
            </div>
        </div>

        <div class="content-area flex-1 flex items-center justify-center relative overflow-hidden bg-[#073042] w-full p-4">
            
            <div
                class="absolute top-0 right-0 w-[400px] md:w-[600px] h-[400px] md:h-[600px] bg-[#0a425a] rounded-full translate-x-1/3 -translate-y-1/3 opacity-50 pointer-events-none">
            </div>
            <div
                class="absolute bottom-0 left-0 w-[300px] md:w-[400px] h-[300px] md:h-[400px] bg-[#3DDC84] rounded-full -translate-x-1/3 translate-y-1/3 opacity-10 pointer-events-none">
            </div>

            <div class="bg-white w-[900px] h-[450px] max-w-full max-h-full rounded-2xl shadow-2xl flex overflow-hidden z-10 relative flex-col md:flex-row">
                
                <div class="w-full md:w-1/3 bg-[#f8f9fa] flex flex-col items-center justify-center p-6 md:p-8 border-b md:border-b-0 md:border-r border-gray-200 shrink-0">
                    <div
                        class="w-24 h-24 md:w-40 md:h-40 bg-gray-300 rounded-full mb-4 md:mb-6 border-4 border-white shadow-md flex items-center justify-center overflow-hidden shrink-0">
                        <i class="fas fa-user-tie text-4xl md:text-6xl text-gray-400"></i>
                    </div>
                    <div class="text-center">
                        <h2 class="text-xl md:text-2xl font-bold text-[#073042] mb-1">Carlos Bruno</h2>
                        <h3 class="text-md md:text-lg font-medium text-[#3DDC84] mb-2 md:mb-4">Oliveira Lopes</h3>
                        <div class="hidden md:block w-12 h-1 bg-gray-300 mx-auto mb-4 rounded-full"></div>
                        <p class="text-gray-500 text-sm font-medium">Professor</p>
                        <p class="text-gray-400 text-xs mt-1">Análise e Desenvolvimento de Sistemas</p>
                        <p class="text-gray-400 text-xs mt-1 font-bold">FATESE</p>
                    </div>
                </div>

                <div class="flex-1 p-6 md:p-12 flex flex-col justify-center overflow-y-auto">
                    <h3 class="text-lg md:text-xl text-gray-400 font-medium mb-4 md:mb-8 uppercase tracking-wider text-center md:text-left">
                        Canais de Comunicação
                    </h3>
                    <div class="space-y-4 md:space-y-6">
                        <div class="flex items-center group justify-center md:justify-start">
                            <div
                                class="w-10 h-10 md:w-12 md:h-12 bg-[#ea4335] rounded-lg flex items-center justify-center text-white text-lg md:text-xl shadow-md group-hover:scale-110 transition-transform duration-200 shrink-0">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div class="ml-4 md:ml-6">
                                <p class="text-[10px] md:text-xs text-gray-400 font-bold uppercase mb-1">E-mail Institucional</p>
                                <p
                                    class="text-sm md:text-lg text-[#073042] font-medium border-b-2 border-transparent group-hover:border-[#ea4335] transition-colors break-all">
                                    carlos.lopes@am.senac.br</p>
                            </div>
                        </div>
                        <div class="flex items-center group justify-center md:justify-start">
                            <div
                                class="w-10 h-10 md:w-12 md:h-12 bg-[#24292e] rounded-lg flex items-center justify-center text-white text-lg md:text-xl shadow-md group-hover:scale-110 transition-transform duration-200 shrink-0">
                                <i class="fab fa-github"></i>
                            </div>
                            <div class="ml-4 md:ml-6">
                                <p class="text-[10px] md:text-xs text-gray-400 font-bold uppercase mb-1">GitHub</p>
                                <p
                                    class="text-sm md:text-lg text-[#073042] font-medium border-b-2 border-transparent group-hover:border-[#24292e] transition-colors">
                                    github.com/carlosbrunocb</p>
                            </div>
                        </div>
                        <div class="flex items-center group justify-center md:justify-start">
                            <div
                                class="w-10 h-10 md:w-12 md:h-12 bg-[#0077b5] rounded-lg flex items-center justify-center text-white text-lg md:text-xl shadow-md group-hover:scale-110 transition-transform duration-200 shrink-0">
                                <i class="fab fa-linkedin-in"></i>
                            </div>
                            <div class="ml-4 md:ml-6">
                                <p class="text-[10px] md:text-xs text-gray-400 font-bold uppercase mb-1">LinkedIn</p>
                                <p
                                    class="text-sm md:text-lg text-[#073042] font-medium border-b-2 border-transparent group-hover:border-[#0077b5] transition-colors">
                                    in/carlosbruno-lopes/</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-4 right-4 md:bottom-6 md:right-8 text-white/50 font-bold text-lg md:text-xl z-20">29</div>
        </div>
    </div>
</body>

</html>
