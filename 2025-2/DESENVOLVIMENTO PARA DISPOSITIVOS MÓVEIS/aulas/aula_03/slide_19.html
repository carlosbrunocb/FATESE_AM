<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Intervalo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #073042; overflow: hidden; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        
        /* Animação da Fumaça do Café */
        .steam {
            position: absolute; width: 10px; height: 30px; background: #fff; border-radius: 50%;
            animation: rise 2s infinite ease-out; opacity: 0; filter: blur(5px);
        }
        .steam:nth-child(1) { left: 40px; animation-delay: 0.5s; }
        .steam:nth-child(2) { left: 60px; animation-delay: 1s; }
        .steam:nth-child(3) { left: 80px; animation-delay: 1.5s; }
        
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            100% { transform: translateY(-40px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col items-center justify-center text-white relative">
    
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-10 pointer-events-none">
        <i class="fas fa-mug-hot absolute top-10 left-20 text-9xl transform -rotate-12"></i>
        <i class="fas fa-gamepad absolute bottom-20 right-20 text-9xl transform rotate-12"></i>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-[#3DDC84] rounded-full filter blur-[150px] opacity-20"></div>
    </div>

    <div class="z-10 text-center">
        <div class="mb-8 relative inline-block">
            <i class="fas fa-mug-hot text-8xl text-[#3DDC84]"></i>
            <div class="absolute -top-6 left-0 w-full h-10 flex justify-center">
                <div class="steam"></div><div class="steam"></div><div class="steam"></div>
            </div>
        </div>
        
        <h1 class="text-6xl font-extrabold font-montserrat tracking-wide mb-2">INTERVALO</h1>
        <p class="text-xl text-gray-300 font-light tracking-widest uppercase mb-12">Recarregue as energias</p>

        <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl py-8 px-16 shadow-2xl inline-block">
            <div id="timer" class="text-8xl font-black font-montserrat tabular-nums tracking-tight">15:00</div>
        </div>

        <div class="mt-12 flex justify-center gap-4">
            <button onclick="startTimer()" class="bg-[#3DDC84] text-[#073042] hover:bg-white hover:text-[#073042] px-6 py-2 rounded-full font-bold transition-all shadow-lg uppercase text-sm tracking-wide">
                <i class="fas fa-play mr-2"></i> Iniciar
            </button>
            <button onclick="resetTimer()" class="bg-transparent border-2 border-white/30 text-white hover:bg-white/10 px-6 py-2 rounded-full font-bold transition-all uppercase text-sm tracking-wide">
                <i class="fas fa-undo mr-2"></i> Resetar
            </button>
        </div>
    </div>

    <div class="absolute bottom-6 right-8 text-white/30 font-bold text-xl">19</div>

    <script>
        let timeLeft = 15 * 60; // 15 minutes
        let timerId = null;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (timerId) return;
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    clearInterval(timerId);
                    timerId = null;
                    document.getElementById('timer').classList.add('text-red-400'); // Visual warning
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 15 * 60;
            document.getElementById('timer').classList.remove('text-red-400');
            updateDisplay();
        }
    </script>
</body>
</html>
