<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Layout XML: Estrutura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f5f8fa; overflow: hidden; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Simulação de Blueprint/Wireframe */
        .blueprint {
            background-color: #3DDC84;
            background-image: linear-gradient(#32b56c 1px, transparent 1px), linear-gradient(90deg, #32b56c 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col">
    <div class="h-24 bg-white flex items-center px-12 border-b border-gray-200 shadow-sm shrink-0 z-20">
        <div>
            <p class="text-[#3DDC84] font-bold uppercase tracking-widest text-sm mb-1 font-montserrat">Passo 1: Layout</p>
            <h1 class="text-4xl font-extrabold text-[#073042] font-montserrat">Estrutura Visual (XML)</h1>
        </div>
    </div>

    <div class="flex-1 flex p-8 gap-8 overflow-hidden items-center justify-center">
        
        <div class="w-1/3 h-[500px] bg-white rounded-xl shadow-lg border border-gray-200 flex flex-col overflow-hidden">
            <div class="bg-gray-100 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                <span class="font-bold text-gray-700 text-sm uppercase tracking-wide">Component Tree</span>
                <i class="fas fa-sitemap text-gray-400"></i>
            </div>
            
            <div class="p-6 font-mono text-sm space-y-4">
                <div class="flex items-center text-[#073042] font-bold">
                    <i class="fas fa-caret-down mr-2 text-gray-400"></i>
                    <i class="fas fa-border-all mr-2 text-orange-500"></i> ConstraintLayout
                </div>

                <div class="pl-8 space-y-4 border-l-2 border-gray-100 ml-2">
                    
                    <div class="flex items-center text-gray-600 hover:text-[#3DDC84] transition-colors cursor-default group">
                        <i class="fas fa-image mr-2 text-purple-500 group-hover:scale-110 transition-transform"></i>
                        <span>ImageView</span>
                        <span class="ml-auto text-xs text-gray-400 italic">(Icone)</span>
                    </div>

                    <div class="flex items-center text-gray-600 hover:text-[#3DDC84] transition-colors cursor-default group">
                        <i class="fas fa-font mr-2 text-blue-500 group-hover:scale-110 transition-transform"></i>
                        <span>TextView</span>
                        <span class="ml-auto text-xs text-gray-400 italic">(Frase)</span>
                    </div>

                    <div class="flex items-center text-gray-600 hover:text-[#3DDC84] transition-colors cursor-default group">
                        <i class="fas fa-square mr-2 text-green-600 group-hover:scale-110 transition-transform"></i>
                        <span>Button</span>
                        <span class="ml-auto text-xs text-gray-400 italic">(Ação)</span>
                    </div>
                </div>
            </div>

            <div class="mt-auto bg-yellow-50 p-4 text-xs text-yellow-800 border-t border-yellow-100">
                <i class="fas fa-info-circle mr-1"></i> O <strong>ConstraintLayout</strong> permite centralizar os itens na tela de forma flexível.
            </div>
        </div>

        <i class="fas fa-arrow-right text-3xl text-gray-300"></i>

        <div class="w-[280px] h-[550px] bg-[#073042] rounded-[3rem] p-4 shadow-2xl relative border-8 border-[#1E1F22]">
            <div class="w-full h-full bg-white rounded-[2rem] overflow-hidden flex flex-col items-center justify-center relative blueprint opacity-90">
                
                <div class="absolute w-full h-[1px] bg-blue-400 top-1/2 opacity-50"></div>
                <div class="absolute h-full w-[1px] bg-blue-400 left-1/2 opacity-50"></div>

                <div class="mb-8 w-16 h-16 border-2 border-dashed border-purple-500 bg-purple-100 flex items-center justify-center text-purple-500">
                    <i class="fas fa-image"></i>
                </div>

                <div class="mb-12 w-3/4 h-20 border-2 border-dashed border-blue-500 bg-blue-50 flex items-center justify-center text-blue-500 text-xs text-center p-2">
                    "Frase do Dia..."
                </div>

                <div class="w-1/2 h-10 border-2 border-dashed border-green-600 bg-green-100 flex items-center justify-center text-green-700 font-bold text-xs uppercase">
                    NOVA FRASE
                </div>

            </div>
        </div>

    </div>
    <div class="absolute bottom-6 right-8 text-gray-400 font-bold text-xl z-20">26</div>
</body>
</html>
