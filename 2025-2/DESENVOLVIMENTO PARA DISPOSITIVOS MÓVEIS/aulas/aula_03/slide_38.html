<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Testando o App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f5f8fa; overflow: hidden; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="w-screen h-screen flex flex-col">
    <div class="h-24 bg-white flex items-center px-12 border-b border-gray-200 shadow-sm shrink-0 z-20">
        <div>
            <p class="text-[#3DDC84] font-bold uppercase tracking-widest text-sm mb-1 font-montserrat">Passo 5: Execução</p>
            <h1 class="text-4xl font-extrabold text-[#073042] font-montserrat">Testando o App</h1>
        </div>
    </div>

    <div class="flex-1 bg-[#2B2D30] p-8 flex flex-col items-center justify-center relative overflow-hidden">
        
        <div class="w-full max-w-4xl bg-[#1E1F22] rounded-xl shadow-2xl border border-gray-700 overflow-hidden z-10 p-8 flex flex-col items-center">
            
            <h2 class="text-white text-2xl font-bold mb-8">Hora de ver a mágica acontecer!</h2>

            <div class="w-full bg-[#3C3F41] rounded-lg p-3 flex items-center justify-center gap-4 border border-gray-600 mb-10 shadow-inner">
                <div class="bg-[#2B2D30] text-gray-300 px-4 py-1.5 rounded text-sm font-mono flex items-center border border-gray-600">
                    <i class="fas fa-mobile-alt mr-2 text-gray-400"></i> Pixel 6 API 33
                </div>
                <div class="bg-[#2B2D30] text-gray-300 px-4 py-1.5 rounded text-sm font-mono flex items-center border border-gray-600">
                    app
                </div>
                <div class="bg-[#3DDC84]/20 text-[#3DDC84] px-6 py-1.5 rounded text-lg font-mono flex items-center border border-[#3DDC84] cursor-pointer animate-pulse shadow-[0_0_15px_rgba(61,220,132,0.4)]">
                    <i class="fas fa-play mr-2"></i> Run
                </div>
                <div class="text-gray-500 text-xs ml-2 font-mono">Shift + F10</div>
            </div>

            <div class="flex items-center gap-6 w-full justify-center">
                <div class="w-16 h-16 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 text-2xl">
                    <i class="fas fa-tasks"></i>
                </div>
                <div class="text-gray-300 text-lg">
                    <p>1. Verifique se o <strong class="text-white">Emulador</strong> está selecionado.</p>
                    <p>2. Clique no botão <strong class="text-[#3DDC84]">Play (Run 'app')</strong>.</p>
                    <p>3. Aguarde o <strong class="text-white">Gradle Build</strong> finalizar.</p>
                    <p>4. Clique no botão e veja as frases mudando!</p>
                </div>
            </div>

        </div>

    </div>
    <div class="absolute bottom-6 right-8 text-gray-500 font-bold text-xl z-20">38</div>
</body>
</html>
