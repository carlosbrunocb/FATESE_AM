<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Minha Primeira Página</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link para CSS externo -->
    <!-- 
        rel="stylesheet": 
            O atributo rel significa "relacionamento" 
            e o valor "stylesheet" informa ao navegador que o arquivo que você está linkando 
                são as regras de design para a sua página
        href="estilo.css": 
            O atributo href significa "referência de hipertexto" 
                e indica o caminho para o arquivo de estilos
        -->
    <link rel="stylesheet" href="estilo.css">
    <!-- <link rel="stylesheet" href="style/estilo.css"> -->
</head>

<body>
    <h1>Olá, Mundo!</h1>
    <!-- <h2>Aula 02 de Desenvolvimento Web</h2> -->
    <p>Esta é minha primeira página HTML.</p>
</body>

</html>
