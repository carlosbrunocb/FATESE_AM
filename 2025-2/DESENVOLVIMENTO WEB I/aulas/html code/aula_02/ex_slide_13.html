<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Site com HTML Semântico </title>
    <meta name="description" content="Exemplo de site com HTML semântico">
    <link rel="stylesheet" href="style/estilo_slide_13.css">
</head>

<body>
    <!-- Cabeçalho do site -->
    <header>
        <h1> Meu Site em HTML5 </h1>
        <!-- Barra de navegação -->
        <nav>
            <ul>
                <li> <a href="#home"> Home </a> </li>
                <li> <a href="ex_slide_07.html"> Sobre </a> </li>
                <li> <a href="https://g1.globo.com"> Galeria </a> </li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo principal -->
    <main>
        <section id="home">
            <h2> Bem-vindo ao site </h2>
            <p> Este é um exemplo de site usando HTML semântico. </p>
        </section>

        <section id="sobre">
            <h2> Sobre </h2>
            <article>
                <h3> Nossa História </h3>
                <p> Conteúdo sobre a empresa... </p>
            </article>
        </section>

        <section id="galeria">
            <h2> Galeria de Mídia </h2>

            <!-- Exemplo com imagem -->
            <figure>
                <img src="https://www.zippyops.com/userfiles/cache/thumbnails/1920/tn-web-application-testing-2621138999.webp"
                    alt="Descrição da imagem" width="400">
                <figcaption> Legenda da imagem </figcaption>
            </figure>

            <!-- Exemplo com vídeo -->
            <video controls width="400">
                <source src="video.mp4" type="video/mp4">
                Seu navegador não suporta o elemento de vídeo.
            </video>

            <iframe width="1018" height="580" src="https://www.youtube.com/embed/0iCxWmryC6g"
                title="CURTA METRAGEM DE ANIMAÇÃO 2D MENINO SEM VERGONHA" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <!-- Exemplo com áudio -->
            <audio controls>
                <source src="https://suamusica.com.br/embed/cd/3116497/vertical/0/dark" 
                type="audio/mpeg">
                Seu navegador não suporta o elemento de áudio.

            </audio>
        </section>
    </main>

    <!-- Barra lateral -->
    <aside>
        <h3> Links Úteis </h3>
        <ul>
            <li> <a href="#"> Link 1 </a> </li>
            <li> <a href="#"> Link 2 </a> </li>
        </ul>
    </aside>

    <!-- Rodapé -->
    <footer>
        <p> © 2025 - Todos os direitos reservados </p>
    </footer>
</body>

</html>
