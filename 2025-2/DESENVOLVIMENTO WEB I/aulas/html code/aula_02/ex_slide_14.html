<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>HTML Intermediário</title>
    <meta name="viewport" content=" width=device-width, initial-scale=1.0">
    <meta name="description" content=" Exemplo de página HTML intermediária">
    <link rel="stylesheet" href="estilo.css">
</head>

<body>
    <header>
        <h1>Minha Página Intermediária</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Bem-vindo ao nosso site</h2>
            <img src="imagem.jpg" alt=" Descrição da imagem" width="400">
        </section>
        <section id="multimedia">
            <article>
                <h2>Recursos Multimídia</h2>
                <h3>Vídeo</h3>
                <vídeo controlswidth="400">
                    <source src="video.mp4" type="video/mp4">
                    <source src="video.webm" type="video/webm">
                    Seu navegador não suporta vídeos HTML5.
                    </video>
                    <h3>Áudio</h3>
                    <audio controls>
                        <source src="audio.mp3" type="audio/mpeg">
                        <source src="audio.ogg" type="audio/ogg">
                        Seu navegador não suporta áudio HTML5.
                    </audio>
            </article>
        </section>
    </main>
    <footer>
        <p>© 2025 Minha Página HTML</p>
    </footer>
</body>

</html>
