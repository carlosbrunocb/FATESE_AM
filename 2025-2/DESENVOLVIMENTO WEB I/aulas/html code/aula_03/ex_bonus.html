<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style_css/ex_bonus.css">
</head>

<body>

    <div id="titulo">
        <h2>O que podemos fazer com o JavaScript?</h2>

        <p>JavaScript pode mudar valores de atributos do HTML.</p>

        <p>Neste exemplo o JavaScript muda o valor do atributo src (source) na imagem.</p>
    </div>

    <div class="ct_lamp">

        <button onclick="document.getElementById('myImage').src='images/pic_bulbon.gif'">Turn on the light</button>

        <img id="myImage" src="images/pic_bulboff.gif" style="width:100px">

        <button onclick="document.getElementById('myImage').src='images/pic_bulboff.gif'">Turn off the light</button>

    </div>

</body>

</html>
