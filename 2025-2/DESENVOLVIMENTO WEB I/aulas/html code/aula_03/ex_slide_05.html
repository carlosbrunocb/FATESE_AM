<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title> Tags de contêiner </title>
    <link rel="stylesheet" href="style_css/ex_style_05.css">
</head>

<body>
    <div id="container" class="secao">
        <h1> Secção com contêiner div e span</h1>
        <p>
            Exemplo de texto de secção com div e
            <span class="destaque">
                <strong> trecho usa span para destacar o texto </strong>
            </span>
        </p>
    </div>
    <div id="container" class="content">
        Este é um bloco de conteúdo.
        <span class="destaque_n1">Texto destacado</span>
        dentro do parágrafo.
    </div>
</body>

</html>
