<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Formulário</title>
    <link rel="stylesheet" href="style_css/ex_style_07.css">
</head>

<body>
    <form id="cadastro">
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                placeholder="nome@exemplo.com">
        </div>

        <div>
            <label for="idade">Idade:</label>
            <input type="number" id="idade" min="18" max="120">
        </div>

        <div>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" pattern="\(\d{2}\) \d{5}-\d{4}" placeholder="(xx) xxxxx-xxxx"">
            
        </div>

        <button type=" submit">Enviar</button>
    </form>

    <script>
        // Acessar o formulário e campo de email
        const form = document.querySelector('form');
        const email = document.getElementById('email');

        // Adicionar um elemento para a mensagem de erro.
        // Você deve criar esse elemento no seu HTML (por exemplo, um <span>)
        // Se não existir, o código abaixo não irá funcionar como esperado.
        const emailDiv = document.querySelector('input[type="email"]').parentNode;
        const errorMsg = document.createElement('span');
        errorMsg.classList.add('error');
        emailDiv.appendChild(errorMsg);

        // Validar durante digitação
        email.addEventListener('input', () => {
            if (email.validity.valid) {
                errorMsg.textContent = '';
                email.classList.remove('invalid');
                email.classList.add('valid');
                email.setCustomValidity('');
            } else if (email.validity.typeMismatch) {
                email.setCustomValidity('Por favor, informe um email válido.');
                errorMsg.textContent = email.validationMessage;
                email.classList.add('invalid');
                email.classList.remove('valid');
            } else if (email.validity.patternMismatch) {
                email.setCustomValidity('O email deve seguir o formato nome@exemplo.com.');
                errorMsg.textContent = email.validationMessage;
                email.classList.add('invalid');
                email.classList.remove('valid');
            } else {
                errorMsg.textContent = '';
                email.classList.remove('invalid');
                email.classList.remove('valid');
                email.setCustomValidity('');
            }
        });

        // Validar ao tentar enviar o formulário
        form.addEventListener('submit', (event) => {
            if (!email.validity.valid) {
                event.preventDefault(); // Impede o envio do formulário
                // Aqui você pode adicionar lógica para focar no campo de email
            }
        });
    </script>

</body>

</html>
