<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>API de Geolocalição</title>
    <link rel="stylesheet" href="style_css/ex_style_16.css">
</head>

<body>
    <button onclick="getLocation()">Obter Localização</button>
    <div id="resultado">Clique no botão para obter sua localização</div>
</body>

<script>
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                showPosition,
                showError
            );
        } else {
            document.getElementById("resultado").innerHTML =
                "Geolocalização não suportada pelo navegador.";
        }
    }

    function showPosition(position) {
        document.getElementById("resultado").innerHTML =
            "Latitude: " + position.coords.latitude +
            "<br>Longitude: " + position.coords.longitude;
    }

    function showError(error) {
        switch (error.code) {
            case error.PERMISSION_DENIED:
                document.getElementById("resultado").innerHTML =
                    "Usuário negou a solicitação de geolocalização.";
                break;
        }
    }
</script>

</html>
