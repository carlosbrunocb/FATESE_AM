<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Canvas</title>
    <link rel="stylesheet" href="style_css/ex_style_22.css">
</head>

<body>
    <canvas id="meuCanvas" width="200" height="100">
        Seu navegador não suporta o elemento canvas
    </canvas>

    <script>
        // JavaScript para desenhar no canvas
        const canvas = document.getElementById('meuCanvas');
        const ctx = canvas.getContext('2d');

        // Retângulo preenchido
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(10, 10, 100, 50);

        // Linha
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(130, 10);
        ctx.lineTo(180, 60);
        ctx.stroke();

        // Círculo
        ctx.fillStyle = '#10b981';
        ctx.beginPath();
        ctx.arc(50, 80, 15, 0, 2 * Math.PI);
        ctx.fill();
    </script>
</body>

</html>
