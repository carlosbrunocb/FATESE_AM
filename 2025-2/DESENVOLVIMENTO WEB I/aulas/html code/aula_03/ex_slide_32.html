<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>ARIA</title>
    <link rel="stylesheet" href="style_css/ex_style_32.css">
</head>

<body>
    <div role="alert" aria-live="assertive">
        Erro no envio do formulário!
    </div>

    <button aria-expanded="false" aria-controls="menu-conteudo">
        Menu
    </button>

    <div id="menu-conteudo" hidden>
        Conteúdo do menu
    </div>

    <span class="icone" aria-hidden="true">★</span>

    <input type="search" aria-label="Buscar produtos">
</body>

</html>
