<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Elemento customizado</title>
    <link rel="stylesheet" href="style_css/ex_style_32.css">
</head>

<body>
    <info-card titulo="Meu componente">
        Este é o conteúdo do meu componente personalizado
    </info-card>

    <br>

    <info-card titulo="Dica Rápida">
        <p>Web Components são reutilizáveis e evitam conflitos de 
            CSS com o restante da sua página.</p>
    </info-card>

    <script src="info-card.js"></script>

    <br>

    <info-card>
        <p>Você pode usar o componente sem o atributo 'titulo' e 
            ele usará o valor padrão definido na classe.</p>
    </info-card>

    
</body>

</html>
