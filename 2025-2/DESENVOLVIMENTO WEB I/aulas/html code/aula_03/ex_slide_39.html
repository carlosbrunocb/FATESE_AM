<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Template</title>
    <link rel="stylesheet" href="style_css/ex_style_32.css">
</head>

<body>
    <template id="card-template">
        <style>
            .card {
                border: 1px solid #ccc;
                padding: 10px;
                margin: 10px 0;
                font-family: sans-serif;
            }

            .title {
                color: darkblue;
            }
        </style>
        <div class="card">
            <h3 class="title">
                <slot name="title">Título Padrão</slot>
            </h3>
            <div class="content">
                <slot>Conteúdo padrão...</slot>
            </div>
        </div>
    </template>

    <div id="host">
        <span slot="title">Meu Cartão</span>
        Este conteúdo aparece dentro do Shadow DOM.
    </div>

    <script>
        // JavaScript para conectar Shadow DOM e Template
        // 1. Encontra o elemento "host" onde o Shadow DOM será anexado
        const host = document.getElementById('host');

        // 2. Anexa um Shadow DOM aberto ao host
        const shadow = host.attachShadow({ mode: 'open' });

        // 3. Encontra o template que contém a estrutura e estilo do componente
        const template = document.getElementById('card-template');

        // 4. Clona o conteúdo do template e o anexa ao Shadow DOM
        shadow.appendChild(template.content.cloneNode(true));
    </script>
</body>

</html>
