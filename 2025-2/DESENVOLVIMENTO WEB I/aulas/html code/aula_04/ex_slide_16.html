<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Alinhamento e Distribuição com Flexbox</title>
    <link rel="stylesheet" href="css_file/ex_slide_16.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .secao {
            padding: 20px;
            margin-bottom: 20px;
        }

        .titulo-secao {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .item {
            background-color: #3498db;
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Estilos específicos para a demonstração de cada container */
        .container-centralizado {
            background-color: #f4f4f4;
        }

        .menu-navegacao {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 20px;
        }

        .menu-navegacao .item {
            background: none;
            padding: 5px 15px;
        }

        .grid-flexbox {
            background-color: #ecf0f1;
            padding: 10px;
            height: 300px;
            /* Altura para mostrar o alinhamento vertical */
            border-radius: 8px;
        }

        .grid-flexbox .item {
            width: 150px;
            margin: 5px;
        }
    </style>
</head>

<body>

    <section class="secao">
        <h2 class="titulo-secao">Centralização Perfeita (`justify-content` e `align-items`)</h2>
        <div class="container-centralizado">
            <div class="item">Conteúdo Centralizado</div>
        </div>
    </section>

    <section class="secao">
        <h2 class="titulo-secao">Distribuição Uniforme (`justify-content: space-between`)</h2>
        <div class="menu-navegacao">
            <div class="item">Início</div>
            <div class="item">Sobre</div>
            <div class="item">Contato</div>
        </div>
    </section>

    <section class="secao">
        <h2 class="titulo-secao">Layout de Grid Flexível (`flex-wrap` e `space-around`)</h2>
        <p style="text-align: center;">Os itens se adaptam e se distribuem no espaço disponível.</p>
        <div class="grid-flexbox">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
            <div class="item">7</div>
            <!-- <div class="item">8</div> -->
        </div>
    </section>

</body>

</html>
