<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de flex-grow, flex-shrink, flex-basis</title>
    <link rel="stylesheet" href="css_file/ex_slide_17.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            border: 2px solid #333;
            padding: 10px;
        }

        .item {
            background-color: #3498db;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
            margin: 5px;
        }
    </style>
</head>

<body>

    <h1>Exemplo de Propriedades de Crescimento e Encolhimento Flexbox</h1>

    <p>Redimensione a janela do navegador para ver como os itens se comportam.</p>

    <div class="container">
        <div class="item item-responsive">Item Responsivo (flex: 1)</div>
        <div class="item item-grow">Item que Cresce 2x Mais (flex-grow: 2)</div>
        <div class="item item-responsive">Item Responsivo (flex: 1)</div>
        <div class="item item-fixed">Item Fixo (200px)</div>
    </div>

</body>

</html>
