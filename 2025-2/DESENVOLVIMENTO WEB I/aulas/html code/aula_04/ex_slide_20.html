<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Posicionamento em CSS Grid</title>
    <link rel="stylesheet" href="css_file/ex_slide_20.css">
</head>

<body>

    <h1>Exemplos de Posicionamento com CSS Grid</h1>

    <h2>1. Usando grid-column, grid-row e shorthand grid-area</h2>
    <div class="container">
        <div class="item item1">Item 1<br> (1/3, 1/3)</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item item2">Item 4<br> (2/3/4/4)</div>
        <div class="item">Item 5</div>
        <div class="item">Item 6</div>
    </div>

    <h2>2. Usando Áreas Nomeadas</h2>
    <div class="container container-named">
        <div class="header">Cabeçalho</div>
        <div class="sidebar">Barra Lateral</div>
        <div class="content">Conteúdo</div>
        <div class="footer">Rodapé</div>
    </div>

</body>

</html>
