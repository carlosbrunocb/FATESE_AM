<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>APIs Nativas JavaScript - Frontend</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&amp;family=Source+Sans+3:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            
        }
        body {
            font-family: 'Source Sans 3', sans-serif;
            color: #e5e7eb;
            background-color: #0f172a;
        }
        h1, h2, h3, h4 {
            font-family: 'Montserrat', sans-serif;
        }
        .slide-container {
            width: 1280px;
            min-height: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: #0f172a;
        }
        .slide-content {
            position: relative;
            z-index: 1;
            padding: 2.5rem 4rem;
            display: flex;
            flex-direction: column;
            min-height: auto;
            flex: 1;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .slide-number {
            font-size: 1rem;
            color: #60a5fa;
            font-weight: 600;
        }
        .slide-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 2.5rem;
            border-left: 6px solid #60a5fa;
            padding-left: 1rem;
        }
        .main-content {
            display: flex;
            flex: 1;
            gap: 3rem;
        }
        .content-left {
            flex: 1;
        }
        .content-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .api-image {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }
        .bullet-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .bullet-item {
            display: flex;
            align-items: flex-start;
            font-size: 1.35rem;
        }
        .bullet-icon {
            color: #60a5fa;
            margin-right: 1rem;
            margin-top: 0.35rem;
            flex-shrink: 0;
        }
        .bullet-text {
            line-height: 1.5;
            color: #e5e7eb;
        }
        .footer {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
        }
        .logo-text {
            font-size: 0.9rem;
            color: #4b5563;
        }
        .pattern-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg width="20" height="20" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" fill="none"/><rect width="1" height="1" fill="rgba(96, 165, 250, 0.05)" x="0" y="0"/></svg>');
            opacity: 0.8;
            z-index: 0;
        }
        .highlight {
            color: #60a5fa;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="slide-container">
<div class="pattern-overlay"></div>
<div class="slide-content">
<div class="header">
<p class="slide-number">3</p>
<p class="logo-text">APIs Nativas JavaScript - Frontend</p>
</div>
<h1 class="slide-title">3. O que são APIs?</h1>
<div class="main-content">
<div class="content-left">
<div class="bullet-list">
<div class="bullet-item">
<div class="bullet-icon"><i class="fas fa-plug"></i></div>
<p class="bullet-text"><span class="highlight">API</span>: Interface para que softwares se comuniquem</p>
</div>
<div class="bullet-item">
<div class="bullet-icon"><i class="fas fa-file-contract"></i></div>
<p class="bullet-text"><span class="highlight">Contratos</span>: métodos, parâmetros, formatos de dados</p>
</div>
<div class="bullet-item">
<div class="bullet-icon"><i class="fas fa-code"></i></div>
<p class="bullet-text"><span class="highlight">Ex.</span>: Web APIs (navegador), APIs REST/HTTP, SDKs</p>
</div>
<div class="bullet-item">
<div class="bullet-icon"><i class="fas fa-exchange-alt"></i></div>
<p class="bullet-text"><span class="highlight">Ilustração</span>: cliente ⇄ API ⇄ serviço</p>
</div>
</div>
</div>
<div class="content-right">
<img alt="Conceito de API mostrando cliente, servidor e interface de comunicação" class="api-image" src="Api_img.jpg"/>
</div>
</div>
<div class="footer">
<p class="logo-text">FATESE | Desenvolvimento Web I</p>
</div>
</div>
</div>
</body>
</html>
