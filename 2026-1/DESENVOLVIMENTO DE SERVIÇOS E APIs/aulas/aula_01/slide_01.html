<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 01: Introdução às APIs e Protocolo HTTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        /* Reseta a página para não ter margens e ocupar 100% do espaço */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Open Sans', sans-serif;
        }

        /* Container principal ocupando toda a tela usando flexbox para centralizar */
        .slide-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Bordas superior e inferior fixadas nas extremidades da tela */
        .border-top, .border-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 16px;
            background-color: #2563eb;
            z-index: 10;
        }
        .border-top { top: 0; }
        .border-bottom { bottom: 0; }

        /* Detalhes laranjas das bordas acompanhando proporção de 25% da tela */
        .border-top-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 25vw;
            height: 16px;
            background-color: #f97316;
            z-index: 11;
        }
        .border-bottom-accent {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 25vw;
            height: 16px;
            background-color: #f97316;
            z-index: 11;
        }

        /* Elementos decorativos posicionados com porcentagem para se adaptarem à tela */
        .deco-1 { position: absolute; top: 15%; left: 10%; width: 12px; height: 12px; border-radius: 50%; background-color: #2563eb; opacity: 0.3; }
        .deco-2 { position: absolute; top: 35%; right: 10%; width: 8px; height: 8px; border-radius: 50%; background-color: #f97316; opacity: 0.4; }
        .deco-3 { position: absolute; bottom: 20%; left: 10%; width: 16px; height: 16px; border-radius: 50%; background-color: #94a3b8; opacity: 0.2; }
        .deco-4 { position: absolute; top: 20%; right: 15%; width: 24px; height: 24px; border-radius: 4px; border: 2px solid #cbd5e1; opacity: 0.5; }

        /* Agrupador do texto central */
        .content {
            text-align: center;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 1200px;
        }

        /* Uso de clamp() para a fonte crescer e encolher de forma inteligente com a tela */
        .tag {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(16px, 1.8vw, 24px);
            font-weight: 700;
            color: #f97316;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 2vh 0;
        }

        .title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(32px, 4.5vw, 64px);
            font-weight: 800;
            color: #1e293b;
            line-height: 1.2;
            margin: 0 0 3vh 0;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(20px, 2.2vw, 32px);
            font-weight: 600;
            color: #2563eb;
            margin: 0 0 4vh 0;
        }

        .divider {
            width: 80px;
            height: 4px;
            background-color: #e2e8f0;
            border-radius: 2px;
            margin: 2vh 0 4vh 0;
        }

        .professor {
            font-size: clamp(18px, 2vw, 28px);
            font-weight: 700;
            color: #334155;
            margin: 0 0 1vh 0;
        }

        .institution {
            font-size: clamp(14px, 1.5vw, 20px);
            font-weight: 400;
            color: #64748b;
            line-height: 1.6;
            margin: 0 0 6vh 0;
        }

        /* Contatos perfeitamente alinhados na base */
        .contacts {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 3vw;
            font-size: clamp(14px, 1.4vw, 18px);
            color: #475569;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }

        .contact-item i {
            color: #f97316;
            font-size: clamp(16px, 1.8vw, 22px);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="border-top"></div>
        <div class="border-top-accent"></div>
        <div class="border-bottom"></div>
        <div class="border-bottom-accent"></div>

        <div class="deco-1"></div>
        <div class="deco-2"></div>
        <div class="deco-3"></div>
        <div class="deco-4"></div>

        <div class="content">
            <p class="tag">Aula 01</p>
            <h1 class="title">Introdução às APIs e Protocolo HTTP</h1>
            <p class="subtitle">Desenvolvimento de Serviços e APIs</p>
            
            <div class="divider"></div>
            
            <p class="professor">Prof. Carlos Bruno Oliveira Lopes</p>
            <p class="institution">
                Faculdade de Tecnologia do Senac (FATESE)<br />
                Curso: Análise e Desenvolvimento de Sistemas
            </p>

            <div class="contacts">
                <p class="contact-item">
                    <i class="fa-solid fa-envelope"></i>
                    carlos.lopes@am.senac.br
                </p>
                <p class="contact-item">
                    <i class="fa-brands fa-github"></i>
                    github.com/carlosbrunocb
                </p>
                <p class="contact-item">
                    <i class="fa-brands fa-linkedin"></i>
                    in/carlosbruno-lopes
                </p>
            </div>
        </div>
    </div>
</body>
</html>
