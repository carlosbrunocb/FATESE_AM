<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roteiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Open Sans', sans-serif;
        }

        .slide-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10vw;
        }

        /* Bordas superiores */
        .border-top { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background-color: #2563eb; z-index: 10; }
        .border-top-accent { position: absolute; top: 0; left: 0; width: 20vw; height: 8px; background-color: #f97316; z-index: 11; }

        /* Decoração lado direito */
        .deco-bg-1 { position: absolute; top: 35%; right: 10%; width: 18vw; height: 18vw; max-width: 250px; max-height: 250px; border-radius: 50%; background-color: #f8fafc; z-index: 1; }
        .deco-bg-2 { position: absolute; top: 45%; right: 5%; width: 12vw; height: 12vw; max-width: 160px; max-height: 160px; border-radius: 50%; border: 4px dashed #e2e8f0; z-index: 1; }
        .deco-icon { position: absolute; top: 40%; right: 12%; font-size: clamp(80px, 10vw, 150px); color: #cbd5e1; opacity: 0.3; z-index: 1; }
        
        .deco-dots-1 { position: absolute; top: 15%; right: 5%; width: 12px; height: 12px; background-color: #2563eb; border-radius: 50%; opacity: 0.3; }
        .deco-dots-2 { position: absolute; bottom: 15%; right: 15%; width: 16px; height: 16px; background-color: #f97316; border-radius: 50%; opacity: 0.4; }
        .deco-dots-3 { position: absolute; top: 65%; right: 3%; width: 20px; height: 20px; border: 3px solid #94a3b8; border-radius: 4px; opacity: 0.3; }

        /* Header */
        .header-section { margin-bottom: 5vh; z-index: 5; }
        .title { font-family: 'Montserrat', sans-serif; font-size: clamp(32px, 4vw, 56px); font-weight: 800; color: #1e293b; margin: 0 0 10px 0; line-height: 1.2; }
        .divider { width: 60px; height: 6px; background-color: #f97316; border-radius: 3px; }

        /* Timeline (Roteiro) */
        .timeline { position: relative; z-index: 5; display: flex; flex-direction: column; gap: clamp(10px, 2.5vh, 25px); width: 70%; max-width: 900px; padding-left: 2vw; }
        
        /* Linha vertical conectando os passos */
        .timeline::before {
            content: '';
            position: absolute;
            top: 5%;
            left: calc(2vw + clamp(20px, 2.5vw, 28px)); /* Centralizado no badge */
            width: 4px;
            height: 90%;
            background-color: #e2e8f0;
            z-index: -1;
        }

        .step-item { display: flex; align-items: center; gap: 1.5vw; }

        .step-badge {
            display: flex; justify-content: center; align-items: center;
            width: clamp(40px, 5vw, 56px); height: clamp(40px, 5vw, 56px);
            border-radius: 50%; border: 4px solid #ffffff;
            font-family: 'Montserrat', sans-serif; font-size: clamp(16px, 1.8vw, 22px);
            font-weight: 700; color: #ffffff; flex-shrink: 0; box-shadow: 0 0 0 2px #fff;
        }

        .step-box {
            display: flex; align-items: center;
            flex-grow: 1; min-height: clamp(50px, 8vh, 80px);
            background-color: #f8fafc; border-radius: 0 8px 8px 0;
            padding: 0 2vw; font-size: clamp(16px, 1.8vw, 24px);
            font-weight: 600; color: #334155;
        }

        /* Variações de cores alternadas */
        .bg-blue { background-color: #2563eb; }
        .bg-orange { background-color: #f97316; }
        .border-blue { border-left: 4px solid #2563eb; }
        .border-orange { border-left: 4px solid #f97316; }

    </style>
</head>
<body>
    <div class="slide-container">
        <div class="border-top"></div>
        <div class="border-top-accent"></div>

        <div class="deco-bg-1"></div>
        <div class="deco-bg-2"></div>
        <i class="fa-solid fa-route deco-icon"></i>
        <div class="deco-dots-1"></div>
        <div class="deco-dots-2"></div>
        <div class="deco-dots-3"></div>

        <div class="header-section">
            <h1 class="title">Roteiro</h1>
            <div class="divider"></div>
        </div>

        <div class="timeline">
            <div class="step-item">
                <div class="step-badge bg-blue">1</div>
                <div class="step-box border-blue">Fundamentos de APIs</div>
            </div>
            <div class="step-item">
                <div class="step-badge bg-orange">2</div>
                <div class="step-box border-orange">Protocolo HTTP: ciclo e anatomia</div>
            </div>
            <div class="step-item">
                <div class="step-badge bg-blue">3</div>
                <div class="step-box border-blue">Métodos, Headers e Status Codes</div>
            </div>
            <div class="step-item">
                <div class="step-badge bg-orange">4</div>
                <div class="step-box border-orange">Prática: DevTools (Network)</div>
            </div>
            <div class="step-item">
                <div class="step-badge bg-blue">5</div>
                <div class="step-box border-blue">Prática: Postman/Insomnia</div>
            </div>
            <div class="step-item">
                <div class="step-badge bg-orange">6</div>
                <div class="step-box border-orange">Encerramento e próxima aula (Arquiteturas)</div>
            </div>
        </div>
    </div>
</body>
</html>
