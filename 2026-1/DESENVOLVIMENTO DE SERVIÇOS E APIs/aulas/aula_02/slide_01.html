<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Aula 02 - Arquiteturas de API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            background-color: #ffffff;
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="flex-1 flex flex-col justify-between pl-20 pr-10 py-16 z-10 relative">
            <div class="border-l-8 border-orange-500 pl-6">
                <p class="text-gray-500 text-lg font-semibold tracking-wide uppercase mb-1">Faculdade de Tecnologia do Senac (FATESE)</p>
                <p class="text-gray-800 text-xl font-bold">Análise e Desenvolvimento de Sistemas</p>
            </div>
            <div class="flex flex-col justify-center h-full">
                <p class="text-blue-900 font-bold text-2xl tracking-widest mb-2 uppercase">Aula 02</p>
                <h1 class="text-7xl font-['Montserrat'] font-extrabold text-gray-900 leading-tight mb-4">
                    Arquiteturas<br />
                    <span class="text-blue-800">de API</span>
                </h1>
                <p class="text-2xl text-gray-600 font-light max-w-2xl mt-4">
                    Princípios REST, Comparação SOAP vs REST e Design de Recursos
                </p>
            </div>
            <div class="mt-auto">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-1 bg-gray-300"></div>
                    <p class="text-gray-400 text-sm uppercase tracking-wider">Docente</p>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-4">Carlos Bruno Oliveira Lopes</h3>
                <div class="grid grid-cols-1 gap-3 text-gray-600 text-lg">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-envelope text-orange-500 w-6 text-center"></i>
                        <p>carlos.lopes@am.senac.br</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-github text-orange-500 w-6 text-center"></i>
                        <p>github.com/carlosbrunocb</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-linkedin text-orange-500 w-6 text-center"></i>
                        <p>in/carlosbruno-lopes</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="w-[35%] bg-slate-900 relative flex items-center justify-center overflow-hidden">
            <div class="absolute top-[-10%] right-[-10%] w-96 h-96 border-[40px] border-slate-800 rounded-full opacity-50"></div>
            <div class="absolute bottom-[-5%] left-[-10%] w-80 h-80 border-[20px] border-blue-900 rounded-full opacity-60"></div>
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                <div class="relative w-64 h-64">
                    <div class="absolute inset-0 bg-blue-600 opacity-20 rounded-xl transform rotate-12"></div>
                    <div class="absolute inset-0 bg-orange-500 opacity-20 rounded-xl transform -rotate-6"></div>
                    <div class="absolute inset-0 border-2 border-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                        <i class="fa-solid fa-network-wired text-8xl text-white opacity-90"></i>
                    </div>
                    <div class="absolute -top-4 -right-4 w-8 h-8 bg-orange-500 rounded-full border-4 border-slate-900"></div>
                    <div class="absolute -bottom-4 -left-4 w-8 h-8 bg-blue-500 rounded-full border-4 border-slate-900"></div>
                    <div class="absolute top-1/2 -right-6 w-4 h-4 bg-white rounded-full"></div>
                </div>
            </div>
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 30px 30px;"></div>
        </div>
    </div>
</body>
</html>
