<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Aula 04 - Framework Express.js</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Source Sans 3', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #0d1117;
            background-image: radial-gradient(#21262d 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }

        .accent-text {
            color: #58a6ff;
        }

        .border-line {
            border-bottom: 1px solid #30363d;
        }

        .glass-panel {
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #30363d;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .code-pill {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="slide-container p-16">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-2">
                <span class="code-pill mono-font">backend/api</span>
                <span class="code-pill mono-font">node.js</span>
                <span class="code-pill mono-font text-green-400 border-green-900 bg-green-900/20">express</span>
            </div>
            <div class="text-gray-500 font-semibold tracking-wide uppercase text-sm">
                <p>FATESE (Senac) • ADS</p>
            </div>
        </div>
        <div class="flex flex-1 flex-col justify-center z-10">
            <div class="w-24 h-1 bg-[#58a6ff] mb-8 rounded-full"></div>
            <h1 class="text-7xl font-bold text-white mb-2 tracking-tight">
                Framework <span class="accent-text">Express.js</span>
            </h1>
            <div class="flex items-baseline gap-4 mb-8">
                <span class="text-2xl text-gray-400 font-light">Aula 04</span>
                <span class="w-2 h-2 rounded-full bg-gray-600"></span>
                <h2 class="text-3xl text-gray-300 font-light">Introdução e Arquitetura de Software</h2>
            </div>
            <div class="flex gap-4 mt-4">
                <div class="flex items-center gap-2 text-gray-400 bg-[#161b22] px-4 py-2 rounded border border-[#30363d]">
                    <i class="fa-solid fa-route text-blue-400"></i>
                    <p class="mono-font text-sm">Routes</p>
                </div>
                <div class="flex items-center gap-2 text-gray-400 bg-[#161b22] px-4 py-2 rounded border border-[#30363d]">
                    <i class="fa-solid fa-sitemap text-purple-400"></i>
                    <p class="mono-font text-sm">Controllers</p>
                </div>
                <div class="flex items-center gap-2 text-gray-400 bg-[#161b22] px-4 py-2 rounded border border-[#30363d]">
                    <i class="fa-solid fa-cogs text-orange-400"></i>
                    <p class="mono-font text-sm">Services</p>
                </div>
            </div>
        </div>
        <div class="mt-auto pt-8 border-t border-[#30363d] flex justify-between items-end">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-2xl font-bold shadow-lg">
                    CL
                </div>
                <div>
                    <p class="text-white text-xl font-semibold mb-1">Carlos Bruno Oliveira Lopes</p>
                    <div class="flex gap-6 text-sm text-gray-400">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-envelope"></i>
                            <p>carlos.lopes@am.senac.br</p>
                        </div>
                        <div class="flex items-center gap-2 hover:text-[#58a6ff] transition-colors">
                            <i class="fa-brands fa-github"></i>
                            <p>github.com/carlosbrunocb</p>
                        </div>
                        <div class="flex items-center gap-2 hover:text-[#0a66c2] transition-colors">
                            <i class="fa-brands fa-linkedin"></i>
                            <p>in/carlosbruno-lopes</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="opacity-20 text-9xl absolute right-10 bottom-10 z-0">
                <i class="fa-brands fa-node text-green-500"></i>
            </div>
        </div>
    </div>
</body>

</html>
