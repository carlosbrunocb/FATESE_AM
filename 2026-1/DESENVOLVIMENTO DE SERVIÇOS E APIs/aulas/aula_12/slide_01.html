<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Aula 12 - Segurança: Autenticação com JWT</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            opacity: 0.5;
        }

        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .main-title {
            font-size: 64px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            margin-bottom: 24px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }

        .title-highlight {
            background: linear-gradient(90deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 28px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 60px;
            font-weight: 400;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 60px;
            margin-bottom: 60px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 60px;
            align-items: center;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .info-icon {
            width: 48px;
            height: 48px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-size: 22px;
        }

        .info-text {
            color: #e2e8f0;
            font-size: 16px;
        }

        .info-label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-weight: 700;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
        }

        .badge i {
            font-size: 14px;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(59, 130, 246, 0.1);
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            right: 50px;
        }

        .circle-2 {
            width: 250px;
            height: 250px;
            bottom: 50px;
            left: 50px;
        }

        .tech-icons {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 16px;
            z-index: 20;
        }

        .tech-icon {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            font-size: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="background-pattern"></div>
        <div class="grid-pattern"></div>
        <div class="decorative-circle circle-1" style="top: -50px; left: 930px; width: 300px; height: 300px;"></div>
        <div class="decorative-circle circle-2" style="top: 420px; left: 50px; width: 250px; height: 250px;"></div>
        <div class="content-wrapper">
            <div class="main-title" style="width: 1100px;">
                Aula 12 – <span class="title-highlight">Segurança: Autenticação com JWT</span>
            </div>
            <div class="subtitle" style="width: 1000px;">
                Implementação de autenticação stateless na API da Livraria
            </div>
            <div class="info-card">
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <div class="info-text">
                        <div class="info-label">Curso</div>
                        <div class="info-value">ADS - Desenvolvimento de APIs</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="info-text">
                        <div class="info-label">Duração</div>
                        <div class="info-value">3 horas (180 min)</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="info-text">
                        <div class="info-label">Projeto</div>
                        <div class="info-value">API da Livraria</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="info-text">
                        <div class="info-label">Foco</div>
                        <div class="info-value">Segurança &amp; JWT</div>
                    </div>
                </div>
            </div>
            <div class="badge">
                <i class="fas fa-lock"></i>
                <span>Autenticação Segura com JSON Web Tokens</span>
            </div>
        </div>
        <div class="tech-icons" style="top: 624px; left: 1224px; width: 200px; height: 56px;">
            <div class="tech-icon">
                <i class="fab fa-node"></i>
            </div>
            <div class="tech-icon">
                <i class="fas fa-database"></i>
            </div>
            <div class="tech-icon">
                <i class="fas fa-key"></i>
            </div>
        </div>
    </div>
</body>

</html>
