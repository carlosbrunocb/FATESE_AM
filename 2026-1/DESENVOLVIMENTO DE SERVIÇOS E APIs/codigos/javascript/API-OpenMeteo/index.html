<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima por Localização</title>
    <link rel="stylesheet" href="css_style/style.css">
</head>

<body>
    <div class="container">
        <h1>Clima por Localização (GPS)</h1>
        <p>Clique no botão para obter a previsão do tempo da sua localização atual.</p>

        <button id="get-weather-btn">Obter Clima</button>

        <div id="loading" class="spinner-hidden"></div>

        <div id="weather-info"></div>
    </div>

    <script src="js_script/weather_app.js"></script>
    <script>
        document.getElementById('get-weather-btn').addEventListener('click', getWeatherAndDisplay);
    </script>
</body>

</html>
