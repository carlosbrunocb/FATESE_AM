<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternar Visibilidade</title>
    <link rel="stylesheet" href="css_style/index_display_block.css">
</head>

<body>

    <button onclick="mostrarElemento()">Mostrar Elemento</button>
    <button onclick="alternarVisibilidade()" id="meuBotao">Alternar Visibilidade</button>

    <div id="meuElemento" style="display: none;">
        <p>Olá! Eu sou um elemento escondido.</p>
    </div>

    <script>
        // Exibindo um elemento escondido
        function mostrarElemento() {
            document.getElementById("meuElemento").style.display = "block";
        }

        // Alternando a visibilidade
        function alternarVisibilidade() {
            let elemento = document.getElementById("meuBotao");
            if (elemento.style.display === "none") {
                elemento.style.display = "block";
            } else {
                elemento.style.display = "none";
            }
        }
    </script>
</body>

</html>
