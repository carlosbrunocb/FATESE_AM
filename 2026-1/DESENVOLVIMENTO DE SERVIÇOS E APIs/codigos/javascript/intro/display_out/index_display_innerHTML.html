<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulação de DOM com JavaScript</title>
    <link rel="stylesheet" href="css_style/index_display_innerHTML.css">
</head>

<body>

    <div class="container">
        <h1>Manipulação de Elementos HTML com JavaScript</h1>
        <p class="description">
            Neste exemplo, vamos demonstrar como o JavaScript pode ser usado para selecionar um elemento HTML e
            modificar seu conteúdo.
            Clique no botão abaixo para ver a mudança acontecer!
        </p>

        <p id="demo" class="original-text">Este é o texto original que será alterado.</p>

        <button onclick="alterarTexto()">Alterar Texto</button>
    </div>

    <script>
        // Selecionando e modificando o conteúdo
        function alterarTexto() {
            document.getElementById("demo").innerHTML =
                "<b>Texto modificado!</b>";
        }
    </script>

</body>

</html>
