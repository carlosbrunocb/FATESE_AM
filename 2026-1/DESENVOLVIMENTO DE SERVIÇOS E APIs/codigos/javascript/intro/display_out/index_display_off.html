<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
</head>

<body>
    <h2>Demo JavaScript in Head</h2>

    <p id="demo">Um parágrafo</p>
    <p id="texto">Exemplo de display</p>
    <!-- Chama o método da instância ao clicar -->
    <button type="button" onclick="apagaTexto()">Tente isso!</button>

    <script>
        
        var count = true;

        // Exemplo com botão
        function apagaTexto() {
            const elemento = document.getElementById('texto');

            if (count) {
                elemento.style.display = 'none';
                count = false;
                console.log(count);
            } else {
                elemento.style.display = 'block';
                count = true;
                console.log(count);
            }

        }
    </script>

</body>

</html>
