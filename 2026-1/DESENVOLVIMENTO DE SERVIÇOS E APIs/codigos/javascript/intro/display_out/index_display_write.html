<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uso de document.write()</title>
    <link rel="stylesheet" href="css_style/index_display_write.css">
</head>
<body>

    <div class="container">
        <h1>Demonstração de <code>document.write()</code></h1>
        <p>Abaixo, o conteúdo é gerado e inserido na página diretamente por JavaScript usando o método <code>document.write()</code>.</p>
    </div>

    <div class="output">
        <script>
            // Exemplo básico
            document.write("Olá Mundo!");

            // Com HTML
            document.write("<h3>Título criado com JS</h3>");

            // Com valores dinâmicos
            let data = new Date();
            document.write("Hoje é: " + data);
        </script>
    </div>

</body>
</html>
