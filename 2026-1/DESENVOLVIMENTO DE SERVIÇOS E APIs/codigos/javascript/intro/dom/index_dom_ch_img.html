<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Imagens</title>
    <link rel="stylesheet" href="css_style/index_dom_ch_img.css">
</head>

<body>

    <img id="minhaImagem" src="https://img.icons8.com/ios/100/javascript--v1.png" alt="Uma imagem de exemplo">

    <button onclick="trocarImagem()">Trocar Imagem</button>

    <script>
        function trocarImagem() {
            const imagem = document.getElementById("minhaImagem");
            imagem.src = (imagem.src != "https://img.icons8.com/color/144/javascript--v1.png")? 
            "https://img.icons8.com/color/144/javascript--v1.png" :
            "https://img.icons8.com/ios/100/javascript--v1.png";

            // imagem.src = "https://img.icons8.com/color/144/javascript--v1.png";
        }
    </script>
</body>

</html>
