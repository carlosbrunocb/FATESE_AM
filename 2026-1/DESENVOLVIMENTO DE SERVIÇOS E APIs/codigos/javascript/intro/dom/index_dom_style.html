<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulação de Estilos</title>
    <link rel="stylesheet" href="css_style/index_dom_style.css">
</head>

<body>

    <h1 id="titulo">Título de Exemplo</h1>

    <div id="box">
        <p>Esta é uma caixa para demonstração de estilos.</p>
    </div>

    <button onclick="mudarEstilos()">Mudar Estilos</button>

    <script>
        function mudarEstilos() {
            // Mudando a cor do título
            document.getElementById("titulo").style.color = "red";

            // Mudando múltiplas propriedades da caixa
            const elemento = document.getElementById("box");
            elemento.style.backgroundColor = (elemento.style.backgroundColor != "blue")?
            "blue" : "white";
            elemento.style.fontSize = (elemento.style.fontSize != "18px")?
            "18px" : "24px";
            elemento.style.padding = (elemento.style.padding =! "10px")?
            "10px" : "16px";
        }
    </script>
</body>

</html>
