<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="ccs_style/index_MyClass.css">
    <script>
        class MyClass {
            constructor() {
                this.count = 0;
            }

            myFunction() {
                this.count++;
                document.getElementById("demo").innerHTML =
                    'Parágrafo Mudado. <br>' +
                    `<span>` +
                    'Classe: &lt;MyClass&gt;, Objeto: myInstance,' +
                    "Método: myInstance.myFunction()<br>" +
                    `>> ${this.count} <<` +
                    `</span>`;
            }
        }

        // Criar instância da classe para ser usada no botão
        const myInstance = new MyClass();
    </script>
</head>

<body>

    <h2>Demo JavaScript in Head</h2>

    <p id="demo">Um parágrafo</p>
    <!-- Chama o método da instância ao clicar -->
    <button type="button" onclick="myInstance.myFunction()">Tente isso!</button>

</body>

</html>
