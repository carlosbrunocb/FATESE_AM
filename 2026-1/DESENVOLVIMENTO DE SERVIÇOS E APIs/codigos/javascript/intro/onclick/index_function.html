<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="ccs_style/index_function.css">
</head>

<body>

    <h2>Demo JavaScript in Body</h2>

    <p id="demo">A Paragraph</p>

    <!-- Este botão, ao ser clicado, executa a função JavaScript chamada "myFunction". 
         O atributo "type='button'" indica que este é apenas um botão comum 
         (não envia formulários). -->
    <!-- O atributo 'onclick' define um manipulador de evento que executa a 
         função JavaScript 'myFunction()' quando o botão é clicado. -->
    <button type="button" onclick="myFunction()">Try it</button>

    <script>
        // Declara uma variável chamada 'text_key' e a inicializa com o valor 'true'.
        // Esta variável age como uma chave de controle para alternar entre os dois estados do parágrafo.
        var text_key = true;

        // Define a função 'myFunction' que é chamada quando o botão é clicado.
        function myFunction() {

            // Usa uma estrutura 'if-else' para verificar o estado atual de 'text_key'.
            if (text_key) {

                // Encontra o elemento HTML com o id "demo" e muda seu conteúdo.
                document.getElementById("demo").innerHTML = "Paragraph changed.";

                // Encontra o elemento HTML com o id "demo" e muda seu conteúdo.
                text_key = false;

            } else {// Se 'text_key' for 'false', executa este bloco.
                // Encontra o elemento com o id "demo" e restaura seu conteúdo original.
                document.getElementById("demo").innerHTML = "A Paragraph!";

                // Altera o valor de 'text_key' de volta para 'true' para o próximo clique.
                text_key = true;
            }

        }
    </script>

</body>

</html>
