<!DOCTYPE html>
<html>

<head>
    <script>
        var count = 0;

        function myFunction() {
            count++;
            document.getElementById("demo").innerHTML = 'Paragráfo Mudado. <br>'+ 
                                                        `Nº de clicks: ${count}`;
        }
    </script>
</head>

<body>
    <link rel="stylesheet" href="ccs_style/index_function_01.css">

    <h2>Demo JavaScript in Head</h2>

    <p id="demo">Um paragráfo</p>
    <button type="button" onclick="myFunction()">Tente isso!</button>

</body>

</html>
