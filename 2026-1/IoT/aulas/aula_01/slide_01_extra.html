<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Aula 01 - Conteúdo Extra: Eletrônica Básica</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #1e3a5f;
            color: #ffffff;
            position: relative;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4% 6%;
            position: relative;
            z-index: 2;
        }

        .title-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(36px, 4vw, 56px);
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        .highlight {
            color: #ff9933;
        }

        .subtitle {
            font-family: 'Roboto', sans-serif;
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 500;
            color: #e0e0e0;
            margin: 0 0 10px 0;
        }

        .module-tag {
            display: inline-block;
            background-color: #ff9933;
            color: #1e3a5f;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: clamp(14px, 1.5vw, 18px);
            font-weight: 700;
            margin-top: 15px;
        }

        .circuit-pattern {
            position: absolute;
            bottom: 0;
            left: 0;
            width: clamp(200px, 30vw, 300px);
            height: clamp(200px, 30vw, 300px);
            opacity: 0.08;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        
        <div class="circuit-pattern">
            <svg height="100%" viewbox="0 0 300 300" width="100%" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" fill="#ffffff" r="5"></circle>
                <circle cx="150" cy="50" fill="#ffffff" r="5"></circle>
                <circle cx="250" cy="50" fill="#ffffff" r="5"></circle>
                <circle cx="50" cy="150" fill="#ffffff" r="5"></circle>
                <circle cx="150" cy="150" fill="#ffffff" r="5"></circle>
                <circle cx="250" cy="150" fill="#ffffff" r="5"></circle>
                <circle cx="50" cy="250" fill="#ffffff" r="5"></circle>
                <circle cx="150" cy="250" fill="#ffffff" r="5"></circle>
                <circle cx="250" cy="250" fill="#ffffff" r="5"></circle>
                <line stroke="#ffffff" stroke-width="2" x1="50" x2="150" y1="50" y2="50"></line>
                <line stroke="#ffffff" stroke-width="2" x1="150" x2="250" y1="50" y2="50"></line>
                <line stroke="#ffffff" stroke-width="2" x1="50" x2="150" y1="150" y2="150"></line>
                <line stroke="#ffffff" stroke-width="2" x1="150" x2="250" y1="150" y2="150"></line>
                <line stroke="#ffffff" stroke-width="2" x1="50" x2="50" y1="50" y2="150"></line>
                <line stroke="#ffffff" stroke-width="2" x1="50" x2="50" y1="150" y2="250"></line>
            </svg>
        </div>

        <div class="content-wrapper">
            <div class="title-section">
                <h1 class="main-title">
                    <p>Conteúdo Extra — <span class="highlight">Eletrônica Básica</span></p>
                    <p>LEDs e Resistores na <span class="highlight">IoT</span></p>
                </h1>
                <p class="subtitle">Complemento da Aula: Introdução à IoT e Ecossistema ESP32</p>
                <div class="module-tag">
                    <p>Praticando a conexão de periféricos</p>
                </div>
            </div>
        </div>
        
    </div>
</body>

</html>
