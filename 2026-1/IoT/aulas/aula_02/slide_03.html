<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Roteiro da Aula</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header-bar {
            width: 100%;
            height: 8px;
            background-color: #3b82f6;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 60px 80px;
        }

        .slide-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 50px 0;
            border-left: 6px solid #3b82f6;
            padding-left: 24px;
        }

        .agenda-container {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .agenda-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 18px 0;
            position: relative;
        }

        .step-number {
            min-width: 60px;
            width: 60px;
            height: 60px;
            background-color: #1e40af;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #60a5fa;
            border: 3px solid #1e3a8a;
        }

        .agenda-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 18px;
            background-color: #1e293b;
            padding: 20px 26px;
            border-radius: 10px;
            border-left: 4px solid #3b82f6;
        }

        .agenda-icon {
            min-width: 40px;
            width: 40px;
            height: 40px;
            background-color: #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #60a5fa;
            font-size: 20px;
        }

        .agenda-text {
            flex: 1;
            color: #e2e8f0;
            font-size: 19px;
            font-weight: 400;
            line-height: 1.4;
            margin: 0;
        }

        .connector-line {
            position: absolute;
            left: 30px;
            top: 60px;
            width: 2px;
            height: 22px;
            background-color: #1e40af;
            opacity: 0.5;
        }

        .agenda-item:last-child .connector-line {
            display: none;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background-color: #1e40af;
            opacity: 0.04;
        }

        .circle-1 {
            width: 280px;
            height: 280px;
            top: -100px;
            right: -100px;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            bottom: -60px;
            left: -80px;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="header-bar"></div>
        <div class="decorative-circle circle-1"></div>
        <div class="decorative-circle circle-2"></div>
        <div class="content-wrapper">
            <h1 class="slide-title">
                <p>Roteiro da Aula</p>
            </h1>
            <div class="agenda-container">
                <div class="agenda-item">
                    <div class="step-number">
                        <p>1</p>
                    </div>
                    <div class="agenda-content">
                        <div class="agenda-icon">
                            <i class="fas fa-play-circle"></i>
                        </div>
                        <p class="agenda-text">Introdução e contexto</p>
                    </div>
                    <div class="connector-line"></div>
                </div>
                <div class="agenda-item">
                    <div class="step-number">
                        <p>2</p>
                    </div>
                    <div class="agenda-content">
                        <div class="agenda-icon">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <p class="agenda-text">Fundamentos: OUTPUT, pinMode(), digitalWrite()</p>
                    </div>
                    <div class="connector-line"></div>
                </div>
                <div class="agenda-item">
                    <div class="step-number">
                        <p>3</p>
                    </div>
                    <div class="agenda-content">
                        <div class="agenda-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <p class="agenda-text">Por que evitar delay() em IoT</p>
                    </div>
                    <div class="connector-line"></div>
                </div>
                <div class="agenda-item">
                    <div class="step-number">
                        <p>4</p>
                    </div>
                    <div class="agenda-content">
                        <div class="agenda-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <p class="agenda-text">millis(): temporização sem bloqueio e máquina de estados</p>
                    </div>
                    <div class="connector-line"></div>
                </div>
                <div class="agenda-item">
                    <div class="step-number">
                        <p>5</p>
                    </div>
                    <div class="agenda-content">
                        <div class="agenda-icon">
                            <i class="fas fa-traffic-light"></i>
                        </div>
                        <p class="agenda-text">Prática: Semáforo (delay vs millis)</p>
                    </div>
                    <div class="connector-line"></div>
                </div>
                <div class="agenda-item">
                    <div class="step-number">
                        <p>6</p>
                    </div>
                    <div class="agenda-content">
                        <div class="agenda-icon">
                            <i class="fas fa-comments"></i>
                        </div>
                        <p class="agenda-text">Discussão, entrega e próximos passos</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
