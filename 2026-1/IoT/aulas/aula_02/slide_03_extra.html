<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Série vs Paralelo</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
            background-color: #0f172a;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #f8fafc;
        }

        .header-section {
            padding: 30px 60px 10px;
        }

        .title {
            font-family: 'Montserrat', sans-serif;
            font-size: 42px;
            font-weight: 700;
        }

        .title-accent {
            color: #38bdf8;
        }

        .content-wrapper {
            flex: 1;
            padding: 20px 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 5px;
            text-align: center;
        }

        .card-desc {
            color: #94a3b8;
            text-align: center;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .svg-container {
            flex: 1;
            background-color: #0f172a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 1px dashed #475569;
        }

        /* SVG Styles */
        .wire { stroke: #38bdf8; stroke-width: 4; fill: none; }
        .wire-gnd { stroke: #94a3b8; stroke-width: 4; fill: none; }
        .resistor { stroke: #fbbf24; stroke-width: 3; fill: none; stroke-linejoin: round; }
        .led-body { fill: #ef4444; stroke: #b91c1c; stroke-width: 2; }
        .node { fill: #ffffff; }
        .text-label { font-family: monospace; fill: #ffffff; font-size: 14px; font-weight: bold; }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="header-section">
            <h1 class="title">
                Esquemas: <span class="title-accent">Série</span> vs <span class="title-accent">Paralelo</span>
            </h1>
        </div>

        <div class="content-wrapper">
            <div class="card">
                <h2 class="card-title text-red-400">Circuito em Série</h2>
                <p class="card-desc">Corrente tem um único caminho. Tensão se divide entre os LEDs.</p>
                
                <div class="svg-container">
                    <svg width="100%" height="100%" viewBox="0 0 300 400">
                        <rect x="130" y="20" width="40" height="30" fill="#ef4444" rx="4"/>
                        <text x="150" y="40" class="text-label" text-anchor="middle">3.3V</text>
                        
                        <path class="wire" d="M 150 50 L 150 80" />
                        
                        <path class="resistor" d="M 150 80 L 140 90 L 160 110 L 140 130 L 160 150 L 150 160" />
                        <text x="180" y="125" class="text-label" fill="#fbbf24">220Ω</text>

                        <path class="wire" d="M 150 160 L 150 190" />
                        
                        <circle cx="150" cy="205" r="15" class="led-body" />
                        <path d="M 143 197 L 157 205 L 143 213 Z" fill="#fff"/>
                        
                        <path class="wire" d="M 150 220 L 150 250" />
                        
                        <circle cx="150" cy="265" r="15" class="led-body" />
                        <path d="M 143 257 L 157 265 L 143 273 Z" fill="#fff"/>

                        <path class="wire-gnd" d="M 150 280 L 150 330" />

                        <rect x="130" y="330" width="40" height="30" fill="#475569" rx="4"/>
                        <text x="150" y="350" class="text-label" text-anchor="middle">GND</text>
                    </svg>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title text-green-400">Circuito em Paralelo</h2>
                <p class="card-desc">O Semáforo: Cada LED recebe sua própria tensão e sinal direto do ESP32.</p>
                
                <div class="svg-container">
                    <svg width="100%" height="100%" viewBox="0 0 400 400">
                        <rect x="40" y="20" width="60" height="30" fill="#38bdf8" rx="4"/>
                        <text x="70" y="40" class="text-label" text-anchor="middle">GPIO 13</text>
                        
                        <rect x="170" y="20" width="60" height="30" fill="#38bdf8" rx="4"/>
                        <text x="200" y="40" class="text-label" text-anchor="middle">GPIO 12</text>
                        
                        <rect x="300" y="20" width="60" height="30" fill="#38bdf8" rx="4"/>
                        <text x="330" y="40" class="text-label" text-anchor="middle">GPIO 14</text>

                        <path class="wire" d="M 70 50 L 70 80" />
                        <path class="wire" d="M 200 50 L 200 80" />
                        <path class="wire" d="M 330 50 L 330 80" />

                        <path class="resistor" d="M 70 80 L 60 90 L 80 110 L 60 130 L 80 150 L 70 160" />
                        <path class="resistor" d="M 200 80 L 190 90 L 210 110 L 190 130 L 210 150 L 200 160" />
                        <path class="resistor" d="M 330 80 L 320 90 L 340 110 L 320 130 L 340 150 L 330 160" />

                        <path class="wire" d="M 70 160 L 70 190" />
                        <path class="wire" d="M 200 160 L 200 190" />
                        <path class="wire" d="M 330 160 L 330 190" />

                        <circle cx="70" cy="205" r="15" fill="#ef4444" stroke="#b91c1c" stroke-width="2" />
                        <circle cx="200" cy="205" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2" />
                        <circle cx="330" cy="205" r="15" fill="#10b981" stroke="#047857" stroke-width="2" />

                        <path class="wire-gnd" d="M 70 220 L 70 290" />
                        <path class="wire-gnd" d="M 200 220 L 200 290" />
                        <path class="wire-gnd" d="M 330 220 L 330 290" />

                        <path class="wire-gnd" d="M 50 290 L 350 290" />
                        <path class="wire-gnd" d="M 200 290 L 200 330" />
                        <circle cx="70" cy="290" r="4" class="node" />
                        <circle cx="200" cy="290" r="4" class="node" />
                        <circle cx="330" cy="290" r="4" class="node" />

                        <rect x="180" y="330" width="40" height="30" fill="#475569" rx="4"/>
                        <text x="200" y="350" class="text-label" text-anchor="middle">GND</text>
                    </svg>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
