<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>O que é uma Saída Digital?</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            overflow: hidden; /* Evita barras de rolagem indesejadas */
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header-bar {
            width: 100%;
            height: 8px;
            background-color: #3b82f6;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 60px 80px;
            box-sizing: border-box;
        }

        .slide-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 44px;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 45px 0;
            border-left: 6px solid #3b82f6;
            padding-left: 24px;
        }

        .concept-highlight {
            background-color: #1e40af;
            border: 3px solid #3b82f6;
            border-radius: 16px;
            padding: 32px 40px;
            margin-bottom: 35px;
            position: relative;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
        }

        .concept-icon {
            position: absolute;
            top: -35px;
            right: 40px;
            width: 70px;
            height: 70px;
            background-color: #60a5fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: #0f172a;
            border: 4px solid #0f172a;
        }

        .concept-text {
            font-family: 'Roboto', sans-serif;
            font-size: 24px;
            font-weight: 500;
            color: #ffffff;
            line-height: 1.6;
            margin: 0;
        }

        .details-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            background-color: #1e293b;
            padding: 20px 24px;
            border-radius: 10px;
            border-left: 4px solid #60a5fa;
        }

        .detail-icon {
            min-width: 40px;
            width: 40px;
            height: 40px;
            background-color: #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #60a5fa;
            font-size: 20px;
        }

        .detail-text {
            flex: 1;
            color: #e2e8f0;
            font-size: 19px;
            font-weight: 400;
            line-height: 1.5;
            margin: 0;
            padding-top: 6px;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background-color: #1e40af;
            opacity: 0.04;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
        }

        .circle-2 {
            width: 220px;
            height: 220px;
            bottom: -80px;
            left: -80px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header-bar"></div>
        <div class="decorative-circle circle-1"></div>
        <div class="decorative-circle circle-2"></div>
        <div class="content-wrapper">
            <h1 class="slide-title">
                <p>O que é uma Saída Digital (GPIO como OUTPUT)?</p>
            </h1>
            <div class="concept-highlight">
                <div class="concept-icon">
                    <i class="fas fa-microchip"></i>
                </div>
                <p class="concept-text">Um pino configurado como OUTPUT fornece nível ALTO (HIGH ~3,3 V) ou BAIXO (LOW ~0 V)</p>
            </div>
            <div class="details-grid">
                <div class="detail-item">
                    <div class="detail-icon">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <p class="detail-text">Controla atuadores simples: LEDs, buzzers, relés (com driver)</p>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <p class="detail-text">No ESP32, a maioria dos GPIOs é de 3,3 V (atenção a pinos reservados/boot)</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
