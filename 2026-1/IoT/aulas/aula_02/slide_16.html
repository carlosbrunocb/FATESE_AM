<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Versão 1: Semáforo com delay() — Ideia</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header-bar {
            width: 100%;
            height: 8px;
            background-color: #3b82f6;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 60px 80px;
        }

        .slide-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 50px 0;
            border-left: 6px solid #3b82f6;
            padding-left: 24px;
        }

        .content-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background-color: #1e293b;
            padding: 24px 28px;
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
            transition: transform 0.2s;
        }

        .list-item:hover {
            transform: translateX(8px);
            border-left-color: #60a5fa;
        }

        .icon-wrapper {
            min-width: 50px;
            width: 50px;
            height: 50px;
            background-color: #1e40af;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #60a5fa;
            font-size: 24px;
        }

        .item-text {
            flex: 1;
            color: #e2e8f0;
            font-size: 22px;
            font-weight: 400;
            line-height: 1.5;
            margin: 0;
            padding-top: 8px;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background-color: #1e40af;
            opacity: 0.04;
        }

        .circle-1 {
            width: 250px;
            height: 250px;
            top: -80px;
            right: -80px;
        }

        .circle-2 {
            width: 180px;
            height: 180px;
            bottom: 40px;
            left: -60px;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="header-bar"></div>
        <div class="decorative-circle circle-1"></div>
        <div class="decorative-circle circle-2"></div>
        <div class="content-wrapper">
            <h1 class="slide-title">
                <p>Versão 1: Semáforo com delay() — Ideia</p>
            </h1>
            <div class="content-list">
                <div class="list-item">
                    <div class="icon-wrapper">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <p class="item-text">Consolidar a lógica de estados: liga um LED por vez</p>
                </div>
                <div class="list-item">
                    <div class="icon-wrapper">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <p class="item-text">Simples e didático, porém bloqueante</p>
                </div>
                <div class="list-item">
                    <div class="icon-wrapper">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <p class="item-text">Útil para protótipos rápidos, inadequado para IoT produtiva</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
