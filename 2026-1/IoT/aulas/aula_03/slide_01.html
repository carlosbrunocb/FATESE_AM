<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Aula 03: GPIO Digital — Input e Pull-up/down</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
            position: relative;
            z-index: 2;
        }

        .circuit-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            z-index: 1;
        }

        .title-main {
            font-family: 'Montserrat', sans-serif;
            font-size: 64px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.2;
            color: #60a5fa;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 50px;
        }

        .info-section {
            background-color: rgba(30, 41, 59, 0.8);
            border-left: 4px solid #60a5fa;
            padding: 30px 40px;
            border-radius: 8px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 900px;
        }

        .course-name {
            font-size: 22pt;
            font-weight: auto;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .institution-name {
            font-size: 17pt;
            font-weight: 300;
            color: #cbd5e1;
        }

        .professor-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 900px;
        }

        .professor-name {
            font-size: 24pt;
            font-weight: auto;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            font-size: 16px;
        }

        .contact-icon {
            color: #60a5fa;
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #60a5fa;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <svg class="circuit-bg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <circle cx="200" cy="150" fill="none" r="60" stroke="currentColor" stroke-width="2"></circle>
            <circle cx="1080" cy="570" fill="none" r="80" stroke="currentColor" stroke-width="2"></circle>
            <line stroke="currentColor" stroke-width="2" x1="100" x2="300" y1="100" y2="100"></line>
            <line stroke="currentColor" stroke-width="2" x1="980" x2="1180" y1="620" y2="620"></line>
            <rect fill="none" height="100" stroke="currentColor" stroke-width="2" width="100" x="400" y="50"></rect>
            <rect fill="none" height="80" stroke="currentColor" stroke-width="2" width="80" x="780" y="570"></rect>
        </svg>
        <div class="content-wrapper">
            <div>
                <p class="title-main">GPIO Digital</p>
            </div>
            <div>
                <p class="subtitle">Input e Pull-up/down</p>
            </div>
            <div class="info-section">
                <div>
                    <p class="subtitle" style="font-size: 25pt; margin-bottom: 4px; color: #94a3b8;">Módulo I — Fundamentos e Hardware</p>
                </div>
                <div>
                    <p class="course-name">Análise e Desenvolvimento de Sistemas</p>
                </div>
                <div>
                    <p class="institution-name">Faculdade de Tecnologia do Senac (FATESE)</p>
                </div>
            </div>
            <div class="professor-section">
                <div>
                    <p class="professor-name">Professor: Carlos Bruno Oliveira Lopes</p>
                </div>
                <div class="contact-grid">
                    <div class="contact-item">
                        <i class="fas fa-envelope contact-icon"></i>
                        <p>carlos.lopes@am.senac.br</p>
                    </div>
                    <div class="contact-item">
                        <i class="fab fa-github contact-icon"></i>
                        <p>github.com/carlosbrunocb</p>
                    </div>
                    <div class="contact-item">
                        <i class="fab fa-linkedin contact-icon"></i>
                        <p>in/carlosbruno-lopes/</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="accent-bar"></div>
    </div>
</body>

</html>
