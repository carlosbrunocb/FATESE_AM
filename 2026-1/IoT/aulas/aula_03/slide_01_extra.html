<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Conteúdo Extra - Aula 03</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
        }

        .logo-placeholder {
            color: #38bdf8;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lesson-badge {
            background-color: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 80px;
            position: relative;
            z-index: 10;
        }

        .title-section {
            max-width: 900px;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 64px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .highlight {
            color: #38bdf8;
        }

        .subtitle {
            font-size: 24px;
            color: #94a3b8;
            font-weight: 400;
            margin-bottom: 30px;
        }

        .esp32-badge {
            display: inline-block;
            background: linear-gradient(90deg, #38bdf8 0%, #3b82f6 100%);
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 50px;
        }

        .circuit-bg {
            position: absolute;
            right: -10%;
            top: 20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, rgba(15,23,42,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="grid-pattern"></div>
        <div class="circuit-bg"></div>
        
        <div class="header-top z-10 relative">
            <div class="logo-placeholder">
                <i class="fas fa-microchip"></i>
                <span>IoT LAB</span>
            </div>
            <div class="lesson-badge">Módulo I • Fundamentos e Hardware</div>
        </div>

        <div class="main-content">
            <div class="title-section">
                <span class="esp32-badge">Conteúdo Extra</span>
                <h1 class="main-title">
                    <p>Entradas Digitais,</p>
                    <p><span class="highlight">Pull-up / Pull-down</span> e</p>
                    <p>Lógica de Debounce</p>
                </h1>
                <h2 class="subtitle">
                    <p>Suporte teórico e prático para o Semáforo de Pedestres (Aula 03)</p>
                </h2>
            </div>
        </div>
    </div>
</body>

</html>
