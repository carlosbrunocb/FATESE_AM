<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 60px 80px;
            position: relative;
            z-index: 2;
        }

        .circuit-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
        }

        .slide-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 52px;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 40px;
            border-bottom: 4px solid #60a5fa;
            padding-bottom: 20px;
        }

        .timeline-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            padding-left: 60px;
        }

        .timeline-line {
            position: absolute;
            left: 23px;
            top: 30px;
            bottom: 30px;
            width: 4px;
            background-color: #60a5fa;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }

        .timeline-dot {
            position: absolute;
            left: -37px;
            width: 18px;
            height: 18px;
            background-color: #60a5fa;
            border: 4px solid #0f172a;
            border-radius: 50%;
            z-index: 3;
        }

        .timeline-content {
            flex: 1;
            background-color: rgba(30, 41, 59, 0.6);
            padding: 18px 24px;
            border-radius: 8px;
            border-left: 4px solid #60a5fa;
        }

        .timeline-text {
            font-size: 24px;
            font-weight: 400;
            color: #e2e8f0;
            line-height: 1.4;
        }

        .timeline-icon {
            color: #60a5fa;
            font-size: 22px;
            min-width: 30px;
        }

        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #60a5fa;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <svg class="circuit-bg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <circle cx="200" cy="150" fill="none" r="60" stroke="currentColor" stroke-width="2"></circle>
            <circle cx="1080" cy="570" fill="none" r="80" stroke="currentColor" stroke-width="2"></circle>
            <line stroke="currentColor" stroke-width="2" x1="100" x2="300" y1="100" y2="100"></line>
            <line stroke="currentColor" stroke-width="2" x1="980" x2="1180" y1="620" y2="620"></line>
        </svg>
        <div class="content-wrapper">
            <div>
                <p class="slide-title">Agenda</p>
            </div>
            <div class="timeline-container">
                <div class="timeline-line"></div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <i class="fas fa-microchip timeline-icon"></i>
                            <p class="timeline-text">Fundamentos: digitais vs. analógicos</p>
                        </div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <i class="fas fa-plug timeline-icon"></i>
                            <p class="timeline-text">Entradas digitais, floating, pull-up/down</p>
                        </div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <i class="fas fa-wave-square timeline-icon"></i>
                            <p class="timeline-text">Bounce e debounce (software)</p>
                        </div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <i class="fas fa-traffic-light timeline-icon"></i>
                            <p class="timeline-text">Desafio prático: Semáforo de Pedestres (Wokwi)</p>
                        </div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <i class="fas fa-check-circle timeline-icon"></i>
                            <p class="timeline-text">Entregáveis e encerramento</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="accent-bar"></div>
    </div>
</body>

</html>
