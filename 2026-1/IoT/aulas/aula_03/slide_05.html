<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sinais Digitais vs. Analógicos — Conceitos</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 60px 80px;
            position: relative;
            z-index: 2;
        }

        .circuit-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
        }

        .slide-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 52px;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 50px;
            border-bottom: 4px solid #60a5fa;
            padding-bottom: 20px;
        }

        .bullet-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding-left: 0;
            list-style: none;
        }

        .bullet-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background-color: rgba(30, 41, 59, 0.6);
            padding: 24px 30px;
            border-radius: 8px;
            border-left: 4px solid #60a5fa;
            transition: transform 0.2s;
        }

        .bullet-icon {
            color: #60a5fa;
            font-size: 24px;
            min-width: 30px;
            margin-top: 4px;
        }

        .bullet-text {
            font-size: 26px;
            font-weight: 400;
            color: #e2e8f0;
            line-height: 1.5;
        }

        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <svg class="circuit-bg" preserveAspectRatio="xMidYMid slice" viewbox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
            <circle cx="200" cy="150" fill="none" r="60" stroke="currentColor" stroke-width="2"></circle>
            <circle cx="1080" cy="570" fill="none" r="80" stroke="currentColor" stroke-width="2"></circle>
            <line stroke="currentColor" stroke-width="2" x1="100" x2="300" y1="100" y2="100"></line>
            <line stroke="currentColor" stroke-width="2" x1="980" x2="1180" y1="620" y2="620"></line>
        </svg>
        <div class="content-wrapper">
            <div>
                <p class="slide-title">Sinais Digitais vs. Analógicos — Conceitos</p>
            </div>
            <ul class="bullet-list">
                <li class="bullet-item">
                    <i class="fas fa-microchip bullet-icon"></i>
                    <p class="bullet-text"><strong>Digital:</strong> dois estados (0/1, LOW/HIGH). No ESP32: ~0 V (LOW) e ~3,3 V (HIGH).</p>
                </li>
                <li class="bullet-item">
                    <i class="fas fa-wave-square bullet-icon"></i>
                    <p class="bullet-text"><strong>Analógico:</strong> valores contínuos de tensão lidos por ADC (12 bits → 0 a 4095).</p>
                </li>
                <li class="bullet-item">
                    <i class="fas fa-lightbulb bullet-icon"></i>
                    <p class="bullet-text"><strong>Impacto prático:</strong> digitais para comutar/ler eventos; analógicos para medir grandezas.</p>
                </li>
            </ul>
        </div>
        <div class="accent-bar"></div>
    </div>
</body>
</html>
