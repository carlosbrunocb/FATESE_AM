<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vamos à Prática</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8vw;
            position: relative;
            z-index: 2;
        }

        .circuit-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.06;
            z-index: 1;
        }

        .icon-container {
            margin-bottom: 5vh;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .main-icon {
            font-size: clamp(80px, 10vw, 120px);
            color: #60a5fa;
            text-align: center;
        }

        .divider-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(40px, 6vw, 80px);
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            margin-bottom: 2vh;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .title-accent {
            color: #60a5fa;
        }

        .divider-subtitle {
            font-family: 'Roboto', sans-serif;
            font-size: clamp(20px, 2.5vw, 28px);
            font-weight: 400;
            color: #94a3b8;
            text-align: center;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
        }

        .highlight-text {
            color: #60a5fa;
            font-weight: 500;
        }

        .decorative-line {
            width: 20vw;
            max-width: 200px;
            height: 4px;
            background-color: #60a5fa;
            margin: 4vh auto;
        }

        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #60a5fa;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <svg class="circuit-bg" preserveAspectRatio="xMidYMid slice" viewbox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
            <circle cx="200" cy="150" fill="none" r="60" stroke="currentColor" stroke-width="2"></circle>
            <circle cx="1080" cy="570" fill="none" r="80" stroke="currentColor" stroke-width="2"></circle>
            <circle cx="640" cy="360" fill="none" r="100" stroke="currentColor" stroke-width="2"></circle>
            <line stroke="currentColor" stroke-width="2" x1="100" x2="300" y1="100" y2="100"></line>
            <line stroke="currentColor" stroke-width="2" x1="980" x2="1180" y1="620" y2="620"></line>
            <line stroke="currentColor" stroke-width="2" x1="540" x2="740" y1="360" y2="360"></line>
            <rect fill="none" height="100" stroke="currentColor" stroke-width="2" width="100" x="400" y="50"></rect>
            <rect fill="none" height="80" stroke="currentColor" stroke-width="2" width="80" x="780" y="570"></rect>
        </svg>
        <div class="content-wrapper">
            <div class="icon-container">
                <i class="fas fa-hands-helping main-icon"></i>
            </div>
            <div>
                <p class="divider-title">Vamos à <span class="title-accent">Prática</span></p>
            </div>
            <div class="decorative-line"></div>
            <div>
                <p class="divider-subtitle">Desafio em equipes no simulador <span class="highlight-text">Wokwi</span>:
                    Semáforo de Pedestres com lógica de segurança, <span class="highlight-text">debounce</span> e <span class="highlight-text">cooldown</span>.</p>
            </div>
        </div>
        <div class="accent-bar"></div>
    </div>
</body>
</html>
