<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Capa - Gestão Ágil e Backlog no GitHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&amp;family=Lato:wght@300;400;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        .tech-bg-shape {
            position: absolute;
            background-color: #F6F8FA;
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="slide-container text-gray-800">
        <!-- Background Shapes (No Gradients) -->
        <!-- Right angled background -->
        <div
            class="tech-bg-shape top-0 right-0 w-2/5 h-full transform -skew-x-12 origin-top-right border-l border-gray-200">
        </div>
        <!-- Bottom left accent -->
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-blue-50 rounded-tr-full opacity-60 z-0"></div>
        <!-- Top Accent Bar -->
        <div class="w-full h-3 bg-[#0969DA] z-10 shadow-sm"></div>
        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col justify-center px-20 z-10 relative">
            <!-- Context Labels -->
            <div class="flex flex-col items-start mb-6 animate-fade-in-up">
                <div class="flex items-center gap-3 mb-2">
                    <span
                        class="bg-[#F6F8FA] text-gray-600 px-3 py-1 rounded text-sm font-semibold border border-gray-200">
                        <i class="fas fa-university mr-2 text-gray-400"></i>FATESE
                    </span>
                    <span
                        class="bg-[#F6F8FA] text-gray-600 px-3 py-1 rounded text-sm font-semibold border border-gray-200">
                        Análise e Desenvolvimento de Sistemas
                    </span>
                </div>
                <div class="border-l-4 border-[#2DA44E] pl-6 py-1">
                    <p class="text-2xl text-[#0969DA] font-bold tracking-tight">Projeto Integrador I</p>
                </div>
            </div>
            <!-- Title Section -->
            <div class="mb-16 max-w-4xl">
                <div
                    class="inline-flex items-center bg-[#0969DA] text-white px-4 py-1.5 rounded-full text-sm font-bold mb-5 shadow-sm">
                    <i class="fas fa-layer-group mr-2"></i> AULA 05.1
                </div>
                <h1 class="text-6xl font-black text-[#24292F] leading-none mb-6">
                    Transformando<br />
                    <span class="text-[#0969DA]">Requisitos em Ação</span>
                </h1>
                <p class="text-3xl text-gray-500 font-light border-b pb-6 border-gray-200 inline-block pr-12">
                    GitHub Projects, Kanban e Metodologia Ágil
                </p>
            </div>
            <!-- Footer: Professor & Contacts -->
            <div class="flex items-end justify-between mt-auto mb-12">
                <!-- Professor Info -->
                <div class="flex flex-col">
                    <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-1">Ministrado por</p>
                    <div class="flex items-center gap-3">
                        <div
                            class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center border border-gray-200 text-[#0969DA]">
                            <i class="fas fa-user-tie text-xl"></i>
                        </div>
                        <div>
                            <p class="text-xl font-bold text-[#24292F]">Carlos Bruno Oliveira Lopes</p>
                            <p class="text-sm text-gray-500">Professor</p>
                        </div>
                    </div>
                </div>
                <!-- Contact Links -->
                <div class="flex flex-col items-end gap-2 text-sm">
                    <div
                        class="flex items-center gap-3 bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100">
                        <span class="text-gray-600 font-medium">carlos.lopes@am.senac.br</span>
                        <i class="fas fa-envelope text-[#0969DA]"></i>
                    </div>
                    <div
                        class="flex items-center gap-3 bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100">
                        <span class="text-gray-600 font-medium">github.com/carlosbrunocb</span>
                        <i class="fab fa-github text-[#24292F]"></i>
                    </div>
                    <div
                        class="flex items-center gap-3 bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100">
                        <span class="text-gray-600 font-medium">in/carlosbruno-lopes</span>
                        <i class="fab fa-linkedin text-[#0A66C2]"></i>
                    </div>
                </div>
            </div>
        </div>
        <!-- Decorative Icons (Watermark style) -->
        <div class="absolute top-32 right-12 z-0 opacity-5">
            <i class="fab fa-github text-9xl text-gray-800"></i>
        </div>
        <div class="absolute bottom-24 right-48 z-0 opacity-5">
            <i class="fas fa-tasks text-8xl text-gray-800"></i>
        </div>
        <!-- Git Branch Decoration -->
        <div class="absolute left-10 top-0 bottom-0 w-px bg-gray-200 z-0 hidden lg:block" style="left: 40px;"></div>
        <div class="absolute left-8 top-1/4 w-4 h-4 rounded-full border-4 border-[#2DA44E] bg-white z-0"
            style="left: 33px;"></div>
        <div class="absolute left-8 top-2/3 w-4 h-4 rounded-full border-4 border-[#0969DA] bg-white z-0"
            style="left: 33px;"></div>
    </div>
</body>

</html>
