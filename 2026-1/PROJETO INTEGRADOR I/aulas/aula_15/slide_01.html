<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Capa</title>
<link rel="stylesheet" href="./assets/theme.css">
</head>
<body>
<div class="slide-container" data-screen-label="01 Capa" style="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0A0E1A;">

  <!-- Background grid + blobs -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:0; top:0; width:1920px; height:1080px; z-index:1;
    background-color:#0A0E1A;
    background-image:
      linear-gradient(rgba(34,211,238,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,0.06) 1px, transparent 1px);
    background-size:80px 80px;"></div>

  <div data-object="true" data-object-type="shape" style="position:absolute; left:-200px; top:-200px; width:800px; height:800px; z-index:1; border-radius:50%; background:radial-gradient(circle, rgba(34,211,238,0.35) 0%, transparent 60%); filter:blur(80px);"></div>
  <div data-object="true" data-object-type="shape" style="position:absolute; left:1200px; top:600px; width:900px; height:900px; z-index:1; border-radius:50%; background:radial-gradient(circle, rgba(74,222,128,0.25) 0%, transparent 60%); filter:blur(100px);"></div>

  <!-- Top chrome bar -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:120px; top:80px; width:600px; z-index:10;">
    <div style="font-family:'JetBrains Mono',monospace; font-size:14px; color:#22D3EE; letter-spacing:0.3em;">// PROJETO_INTEGRADOR</div>
  </div>
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:1500px; top:80px; width:300px; z-index:10; text-align:right;">
    <div style="font-family:'JetBrains Mono',monospace; font-size:14px; color:#94A3B8; letter-spacing:0.2em;">AULA_15.html</div>
  </div>

  <!-- Sprint badge -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:120px; top:340px; width:180px; height:42px; z-index:5; border:1px solid #22D3EE; border-radius:4px; background:rgba(34,211,238,0.1);"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:120px; top:340px; width:180px; height:42px; z-index:10; text-align:center; line-height:42px;">
    <span style="font-family:'JetBrains Mono',monospace; font-size:13px; color:#22D3EE; letter-spacing:0.2em;">SPRINT 15 / 20</span>
  </div>

  <!-- Title -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:120px; top:420px; width:1500px; z-index:10;">
    <h1 style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:124px; color:#FFFFFF; margin:0; line-height:0.95; letter-spacing:-0.03em;">
      Workshop de<br>
      <span style="color:#22D3EE;">Metodologia</span>
    </h1>
  </div>

  <!-- Subtitle -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:124px; top:740px; width:1500px; z-index:10;">
    <p style="font-family:'Inter',sans-serif; font-weight:400; font-size:32px; color:#94A3B8; margin:0; line-height:1.3; max-width:1200px;">
      Dossiê — Capítulo 3 · O Processo de Construção Prático e<br>Atribuição de Ferramentas &amp; Papéis Ágeis
    </p>
  </div>

  <!-- Bottom rail -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:120px; top:960px; width:1680px; height:2px; z-index:5; background:linear-gradient(90deg, #22D3EE 0%, transparent 100%);"></div>

  <div data-object="true" data-object-type="textbox" style="position:absolute; left:120px; top:990px; width:900px; z-index:10;">
    <div style="font-family:'JetBrains Mono',monospace; font-size:14px; color:#E5E7EB; letter-spacing:0.15em;">
      <span style="color:#4ADE80;">●</span>&nbsp; PROF. CARLOS BRUNO OLIVEIRA LOPES &nbsp;·&nbsp; FATESE
    </div>
  </div>

  <div data-object="true" data-object-type="textbox" style="position:absolute; left:1500px; top:990px; width:300px; z-index:10; text-align:right;">
    <span style="font-family:'JetBrains Mono',monospace; font-size:14px; color:#94A3B8; letter-spacing:0.2em;">60 MIN · BLOCO 03</span>
  </div>

</div>
</body>
</html>
