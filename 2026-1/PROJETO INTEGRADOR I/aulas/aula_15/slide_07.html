<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Divisor - Fundamentos</title>
    <link rel="stylesheet" href="./assets/theme.css">
    <style>
        /* Reset Básico */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            overflow: hidden;
            background: #0A0E1A;
        }

        /* Container Principal em Grid */
        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0A0E1A;
            
            /* Background Grid Pattern */
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.06) 1px, transparent 1px);
            background-size: 80px 80px;
            
            /* Estrutura Macro: Conteúdo Principal e Rodapé */
            display: grid;
            grid-template-rows: 1fr auto;
            padding: 4rem 6vw;
            position: relative;
        }

        /* Brilho Decorativo ao Fundo (Mantido em absolute por ser efeito visual) */
        .ambient-glow {
            position: absolute;
            left: 30vw;
            top: 15vh;
            width: 900px;
            height: 900px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.3) 0%, transparent 60%);
            filter: blur(120px);
            z-index: 1;
            pointer-events: none;
        }

        /* --- Conteúdo Central em Grid (2 Colunas) --- */
        .main-grid {
            display: grid;
            /* Coluna da esquerda menor que a da direita para respeitar as margens originais */
            grid-template-columns: 1fr 1.5fr;
            align-items: center;
            z-index: 10;
        }

        /* Coluna 1: Número Gigante */
        .number-mark {
            font-family: 'JetBrains Mono', monospace;
            /* Uso de clamp para manter a fonte em 500px em telas FHD, mas responsivo em menores */
            font-size: clamp(200px, 26vw, 500px);
            color: #1A2233;
            line-height: 1;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        /* Coluna 2: Textos */
        .content-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: #22D3EE;
            letter-spacing: 0.4em;
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: clamp(60px, 6vw, 112px);
            color: #FFFFFF;
            line-height: 1;
            letter-spacing: -0.03em;
            margin: 0;
        }

        .section-title span {
            color: #22D3EE;
        }

        .divider {
            width: 120px;
            height: 4px;
            background: #22D3EE;
            margin-top: 4.5rem; /* Respeitando o espaçamento original */
            margin-bottom: 1.5rem;
        }

        .section-desc {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: clamp(20px, 1.5vw, 28px);
            color: #94A3B8;
            line-height: 1.45;
            margin: 0;
            max-width: 1080px;
        }

        .section-desc strong {
            color: #E5E7EB;
            font-weight: bold;
        }

        /* --- Rodapé --- */
        .footer-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #475569;
            letter-spacing: 0.2em;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="slide-container" data-screen-label="07 Divisor Fundamentos">

        <div class="ambient-glow" data-object="true" data-object-type="shape"></div>

        <main class="main-grid">
            
            <div data-object="true" data-object-type="textbox">
                <div class="number-mark">02</div>
            </div>

            <div class="content-group" data-object="true" data-object-type="textbox">
                <div class="section-label">BLOCO 02 · 10 MIN</div>
                
                <h1 class="section-title">
                    Fundamentos<br>
                    <span>teóricos</span>
                </h1>
                
                <div class="divider" data-object="true" data-object-type="shape"></div>
                
                <p class="section-desc">
                    Engenharia de escrita técnica, base ágil e o salto<br>conceitual entre <strong>definir</strong> e <strong>documentar uso</strong>.
                </p>
            </div>

        </main>

        <footer class="footer-section">
            <span data-object="true" data-object-type="textbox">
                AULA 15 · BASE TEÓRICA
            </span>
            <span data-object="true" data-object-type="textbox">
                07 / 35
            </span>
        </footer>

    </div>
</body>

</html>
