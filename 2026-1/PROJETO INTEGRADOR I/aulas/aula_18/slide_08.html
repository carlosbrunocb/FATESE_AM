<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="08 Foco da Aula" style="background: var(--ink);">

        <div data-object="true" data-object-type="textbox" class="chrome-header"
            style="color: var(--paper); z-index:10;">
            <div class="left-tag"><span class="dot" style="background: var(--ochre);"></span><span>Recorte da
                    Aula</span></div>
            <div style="color: rgba(245,241,232,0.6);">2 de 9 blocos</div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:180px; width:1760px; z-index:10;">
            <div
                style="font-family: var(--font-sans); font-size:18px; font-weight:600; letter-spacing:0.24em; text-transform:uppercase; color: var(--ochre);">
                O que vamos atacar HOJE</div>
            <h1
                style="font-family: var(--font-display); font-weight:700; font-size:96px; line-height:1.0; color: var(--paper); margin:20px 0 0 0; letter-spacing:-0.02em;">
                O <span style="color: var(--ochre);">núcleo gerador</span><br>de valor da plataforma.
            </h1>
        </div>

        <!-- Diagrama: dois círculos se encontrando -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:280px; top:540px; width:480px; height:480px; background: var(--terracota); border-radius:50%; z-index:2; opacity:0.92;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:280px; top:680px; width:480px; z-index:10; text-align:center;">
            <div
                style="font-family: var(--font-mono); font-size:14px; color: var(--paper); letter-spacing:0.24em; text-transform:uppercase; opacity:0.8;">
                Bloco 2</div>
            <div
                style="font-family: var(--font-display); font-weight:800; font-size:62px; color: var(--paper); line-height:0.95; margin-top:12px;">
                Proposta<br>de Valor</div>
            <div
                style="font-family: var(--font-sans); font-size:18px; color: var(--paper); margin-top:18px; opacity:0.9;">
                Item <strong>4.1.2</strong></div>
        </div>

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:1160px; top:540px; width:480px; height:480px; background: var(--ochre); border-radius:50%; z-index:2; opacity:0.92;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:1160px; top:680px; width:480px; z-index:10; text-align:center;">
            <div
                style="font-family: var(--font-mono); font-size:14px; color: var(--ink); letter-spacing:0.24em; text-transform:uppercase;">
                Bloco 1</div>
            <div
                style="font-family: var(--font-display); font-weight:800; font-size:62px; color: var(--ink); line-height:0.95; margin-top:12px;">
                Segmento<br>de Clientes</div>
            <div style="font-family: var(--font-sans); font-size:18px; color: var(--ink); margin-top:18px;">Item
                <strong>4.1.1</strong></div>
        </div>

        <!-- Zona de interseção -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:830px; top:618px; width:260px; height:324px; background: var(--paper); border-radius:50%; z-index:3;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:830px; top:725px; width:260px; z-index:10; text-align:center;">
            <div
                style="font-family: var(--font-mono); font-size:11px; color: var(--terracota); letter-spacing:0.22em; text-transform:uppercase; font-weight:700;">
                Encaixe</div>
            <div
                style="font-family: var(--font-display); font-weight:800; font-size:28px; color: var(--ink); line-height:1.05; margin-top:8px;">
                Product-<br>Market Fit</div>
        </div>

        <div data-object="true" data-object-type="textbox" class="chrome-footer"
            style="color: rgba(245,241,232,0.6); border-top:1px solid rgba(245,241,232,0.18); z-index:10;">
            <div class="brand">FATESE · Projeto Integrador I</div>
            <div class="page-num" style="color: var(--paper);">08 / 33</div>
        </div>

    </div>
</body>

</html>
