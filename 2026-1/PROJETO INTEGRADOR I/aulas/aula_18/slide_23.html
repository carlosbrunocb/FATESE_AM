<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="23 Oficina Intro" style="background: var(--terracota);">

        <div data-object="true" data-object-type="textbox" class="chrome-header"
            style="color: var(--paper); z-index:10;">
            <div class="left-tag"><span class="dot" style="background: var(--ochre);"></span><span>Capítulo 04 · Mão na
                    massa</span></div>
            <div style="color: rgba(245,241,232,0.7);">Oficina prática</div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:230px; width:1760px; z-index:10;">
            <div
                style="font-family: var(--font-sans); font-size:20px; font-weight:600; letter-spacing:0.28em; text-transform:uppercase; color: var(--ochre);">
                Workshop · 35 min em 3 etapas</div>
            <h1
                style="font-family: var(--font-display); font-weight:700; font-size:172px; line-height:0.88; color: var(--paper); margin:32px 0 0 0; letter-spacing:-0.03em;">
                Oficina de<br>Canvas <span style="color: var(--ochre); font-style:italic;">/parte 1</span>
            </h1>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:830px; width:1760px; z-index:10;">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:24px;">

                <div style="background: rgba(26,26,31,0.18); padding:24px;">
                    <div
                        style="font-family: var(--font-mono); font-size:13px; color: var(--ochre); letter-spacing:0.18em; text-transform:uppercase; font-weight:700;">
                        Etapa 1</div>
                    <div
                        style="font-family: var(--font-display); font-size:28px; font-weight:700; color: var(--paper); margin-top:10px; line-height:1.0;">
                        Mapeamento<br>de Post-its</div>
                </div>

                <div style="background: rgba(26,26,31,0.18); padding:24px;">
                    <div
                        style="font-family: var(--font-mono); font-size:13px; color: var(--ochre); letter-spacing:0.18em; text-transform:uppercase; font-weight:700;">
                        Etapa 2</div>
                    <div
                        style="font-family: var(--font-display); font-size:28px; font-weight:700; color: var(--paper); margin-top:10px; line-height:1.0;">
                        Redação dos<br>Parágrafos</div>
                </div>

                <div style="background: rgba(26,26,31,0.18); padding:24px;">
                    <div
                        style="font-family: var(--font-mono); font-size:13px; color: var(--ochre); letter-spacing:0.18em; text-transform:uppercase; font-weight:700;">
                        Etapa 3</div>
                    <div
                        style="font-family: var(--font-display); font-size:28px; font-weight:700; color: var(--paper); margin-top:10px; line-height:1.0;">
                        Integração no<br>Word do Dossiê</div>
                </div>

            </div>
        </div>

        <div data-object="true" data-object-type="textbox" class="chrome-footer"
            style="color: rgba(245,241,232,0.7); border-top:1px solid rgba(245,241,232,0.25); z-index:10;">
            <div class="brand">FATESE · Projeto Integrador I</div>
            <div class="page-num" style="color: var(--paper);">23 / 33</div>
        </div>

    </div>
</body>

</html>
