<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Abertura — Provocação</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="04 Provocacao">

        <!-- Fundo escuro para impacto -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:1920px; height:1080px; background:#1c1a17; z-index:1;"></div>
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:1920px; height:8px; background:linear-gradient(90deg,#c2410c 0%,#a16207 100%); z-index:2;">
        </div>

        <!-- Aspas decorativas grandes -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:110px; top:140px; width:300px; z-index:5;">
            <div
                style="font-family:'Playfair Display',serif; font-size:380px; line-height:0.6; color:#9a3412; font-weight:700; opacity:0.55;">
                "</div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:130px; width:1680px; z-index:10;">
            <div class="eyebrow" style="color:#fdba74;">Provocação inicial</div>
        </div>

        <!-- Frase central -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:280px; top:340px; width:1500px; z-index:10;">
            <div
                style="font-family:'Playfair Display',serif; font-size:78px; line-height:1.12; color:#f5efe4; font-weight:600; font-style:italic;">
                Uma proposta de valor abstrata<br>
                <span style="color:#fdba74; font-style:normal;">não ajuda o desenvolvedor</span><br>
                a escrever <span
                    style="text-decoration:underline; text-decoration-color:#c2410c; text-decoration-thickness:4px; text-underline-offset:10px;">código
                    que importe.</span>
            </div>
        </div>

        <!-- Linha divisora -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:280px; top:790px; width:120px; height:3px; background:#c2410c; z-index:5;">
        </div>

        <!-- Resposta -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:280px; top:820px; width:1500px; z-index:10;">
            <div
                style="font-family:'IBM Plex Sans',sans-serif; font-size:28px; line-height:1.5; color:#d9cfbc; font-weight:300;">
                O <strong style="color:#fbf7ef;">Value Proposition Canvas</strong> existe para ligar o discurso do
                mercado à especificação de software — convertendo intenção em <em>requisito implementável</em>.
            </div>
        </div>

        <!-- Footer dark -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:1020px; width:1680px; z-index:10;">
            <div
                style="display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:14px; color:#807a72; letter-spacing:0.18em; text-transform:uppercase;">
                <span>Osterwalder et al. · 2014</span>
                <span>04 / 34</span>
            </div>
        </div>

    </div>
</body>

</html>
