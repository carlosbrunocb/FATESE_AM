<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Workshop — introdução</title>
    <link rel="stylesheet" href="../assets/theme.css">
</head>

<body>
    <div class="slide-container"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background: radial-gradient(ellipse at 30% 50%, #2A1B14 0%, #0B1220 60%);"
        data-screen-label="24 Workshop Intro">

        <!-- decoration -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:1920px; height:1080px; z-index:1;" class="dot-grid"></div>

        <!-- big text -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:240px; width:1680px; z-index:10;">
            <div
                style="display:inline-flex; align-items:center; gap:14px; padding:10px 22px; border-radius:999px; background:rgba(242,130,32,0.12); border:1px solid rgba(242,130,32,0.4);">
                <span
                    style="width:8px; height:8px; border-radius:50%; background:#F58220; box-shadow:0 0 12px #F58220;"></span>
                <span class="font-mono"
                    style="font-size:14px; color:#F58220; letter-spacing:0.2em; font-weight:600;">WORKSHOP DE
                    PRODUÇÃO</span>
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:340px; width:1680px; z-index:10;">
            <h1 class="font-display"
                style="margin:0; font-size:160px; font-weight:700; color:#F4F7FB; line-height:0.95; letter-spacing:-0.035em;">
                Mãos no<br>
                <span
                    style="background:linear-gradient(135deg,#F2B33D 0%, #F2675C 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Dossiê</span>
            </h1>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:770px; width:1300px; z-index:10;">
            <p style="margin:0; font-size:30px; line-height:1.4; color:#C7D1E1; font-weight:300;">
                Em três etapas curtas, sua equipe redige <strong style="color:#F4F7FB; font-weight:600;">os itens 4.1.4,
                    4.1.5 e 4.1.6</strong> diretamente no arquivo do Dossiê — integrando com o que foi escrito nas Aulas
                18 e 19.
            </p>
        </div>

        <!-- footer -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:1030px; width:1680px; z-index:10;">
            <div
                style="display:flex; justify-content:space-between; font-size:14px; color:#5A6478; font-family:'JetBrains Mono',monospace; letter-spacing:0.15em;">
                <span>AULA 20 · CANAIS, RECEITAS E CUSTOS</span>
                <span>24 / 30</span>
            </div>
        </div>

    </div>
</body>

</html>
