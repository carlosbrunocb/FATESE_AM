<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Capa</title>
  <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
  <div class="slide-container"
    style="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0F1B2D;">

    <!-- Background grid -->
    <div data-object="true" data-object-type="shape" data-screen-label="01 Capa"
      style="position:absolute; left:0; top:0; width:1920px; height:1080px; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 80px 80px; z-index:1;">
    </div>

    <!-- Diagonal accent -->
    <div data-object="true" data-object-type="shape"
      style="position:absolute; left:1200px; top:-100px; width:900px; height:1300px; background: linear-gradient(135deg, #E94F37 0%, #F4A261 100%); transform: rotate(15deg); opacity:0.92; z-index:1;">
    </div>

    <!-- Code bracket large -->
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:1380px; top:380px; width:420px; height:400px; font-family:'JetBrains Mono', monospace; font-size:280px; font-weight:700; color:rgba(255,255,255,0.85); line-height:1; z-index:10;">
      { }
    </div>

    <!-- Top bar -->
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:80px; width:900px; height:30px; font-family:'JetBrains Mono', monospace; font-size:18px; font-weight:500; color:#F4A261; letter-spacing:0.3em; z-index:10;">
      PROJETO INTEGRADOR · AULA 22
    </div>

    <!-- Thin line -->
    <div data-object="true" data-object-type="shape"
      style="position:absolute; left:120px; top:135px; width:120px; height:3px; background:#E94F37; z-index:10;"></div>

    <!-- Eyebrow -->
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:200px; width:900px; height:40px; font-family:'Inter', sans-serif; font-size:26px; font-weight:500; color:#F4A261; z-index:10;">
      Capítulo 5.3 — Dossiê Técnico
    </div>

    <!-- Main title -->
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:270px; width:1200px; height:380px; font-family:'Space Grotesk', sans-serif; font-size:130px; font-weight:700; color:#F7F4ED; line-height:0.95; letter-spacing:-0.03em; z-index:10;">
      Documentação<br>Técnica:<br><span style="color:#F4A261;">Requisitos</span>
    </div>

    <!-- Subtitle -->
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:740px; width:1100px; height:80px; font-family:'Inter', sans-serif; font-size:32px; font-weight:400; color:rgba(247,244,237,0.85); line-height:1.4; z-index:10;">
      Elicitação e levantamento de Requisitos Funcionais e Não Funcionais para o MVP
    </div>

    <!-- Footer info -->
    <div data-object="true" data-object-type="shape"
      style="position:absolute; left:120px; top:920px; width:1680px; height:1px; background:rgba(247,244,237,0.25); z-index:10;">
    </div>

    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:955px; width:600px; height:80px; font-family:'Inter', sans-serif; font-size:22px; color:rgba(247,244,237,0.9); line-height:1.5; z-index:10;">
      <strong style="color:#F7F4ED;">Prof. Carlos Bruno Oliveira Lopes</strong><br>
      <span style="font-size:18px; color:rgba(247,244,237,0.65);">FATESE · Análise e Desenvolvimento de Sistemas</span>
    </div>

    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:1500px; top:955px; width:300px; height:80px; font-family:'JetBrains Mono', monospace; font-size:16px; color:rgba(247,244,237,0.6); text-align:right; line-height:1.7; z-index:10;">
      22 / 60 min<br>
      <span style="color:#F4A261;">v.2026.1</span>
    </div>

  </div>
</body>

</html>
