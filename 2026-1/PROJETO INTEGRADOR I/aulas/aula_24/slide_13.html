<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Caso AdoptMatch — Abertura</title>
    <link rel="stylesheet" href="./assets/chrome.css">
</head>

<body>
    <div class="slide-container" data-screen-label="13 AdoptMatch intro"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--accent);">

        <!-- Chrome top -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:40px; width:900px; height:24px; z-index:20;">
            <div
                style="display:flex; align-items:center; gap:18px; font-family:var(--font-mono); font-size:14px; letter-spacing:0.12em; color:#fff; opacity:0.85; text-transform:uppercase;">
                <span style="width:8px; height:8px; background:#fff; border-radius:50%; display:inline-block;"></span>
                <span>Estudo de Caso</span>
            </div>
        </div>

        <!-- Decoração: pet silhouette com hearts -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:1320px; top:200px; width:560px; height:560px; z-index:5;">
            <svg width="560" height="560" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">
                <!-- Big paw print -->
                <g fill="#fff" opacity="0.15">
                    <ellipse cx="280" cy="380" rx="120" ry="100" />
                    <ellipse cx="170" cy="240" rx="50" ry="65" />
                    <ellipse cx="250" cy="180" rx="50" ry="65" />
                    <ellipse cx="330" cy="180" rx="50" ry="65" />
                    <ellipse cx="410" cy="240" rx="50" ry="65" />
                </g>
                <!-- Hearts pattern -->
                <g fill="#fff" opacity="0.25">
                    <path
                        d="M 80 80 c -10 -15 -30 -10 -30 8 c 0 15 20 30 30 38 c 10 -8 30 -23 30 -38 c 0 -18 -20 -23 -30 -8 z" />
                    <path
                        d="M 470 470 c -8 -12 -24 -8 -24 6 c 0 12 16 24 24 30 c 8 -6 24 -18 24 -30 c 0 -14 -16 -18 -24 -6 z" />
                </g>
            </svg>
        </div>

        <!-- Kicker -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:200px; width:800px; height:30px; z-index:10;">
            <div
                style="font-family:var(--font-mono); font-size:16px; letter-spacing:0.22em; text-transform:uppercase; color:#fff; opacity:0.85;">
                / Padrão de excelência técnico-acadêmica</div>
        </div>

        <!-- Number -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:260px; width:600px; height:200px; z-index:10;">
            <div
                style="font-family:var(--font-display); font-weight:700; font-size:200px; line-height:0.9; color:#fff; letter-spacing:-0.03em; opacity:0.9;">
                5.5</div>
        </div>

        <!-- Title -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:500px; width:1300px; height:300px; z-index:10;">
            <div
                style="font-family:var(--font-display); font-weight:600; font-size:96px; line-height:1.0; letter-spacing:-0.02em; color:#fff;">
                Caso<br>
                <span style="font-weight:700;">AdoptMatch</span>
            </div>
            <div
                style="font-family:var(--font-display); font-weight:400; font-size:34px; color:#fff; opacity:0.9; line-height:1.3; margin-top:24px;">
                Como o projeto organiza a construção de seu MVP em<br>
                4 Sprints tangíveis e encerra a documentação técnica.
            </div>
        </div>

        <!-- Pill tags -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:880px; width:1300px; height:60px; z-index:10;">
            <div style="display:flex; gap:14px; flex-wrap:wrap;">
                <span
                    style="font-family:var(--font-mono); font-size:14px; letter-spacing:0.1em; color:#fff; background:rgba(255,255,255,0.18); padding:10px 18px; border:1px solid #fff;">FRAMEWORK
                    SCRUM</span>
                <span
                    style="font-family:var(--font-mono); font-size:14px; letter-spacing:0.1em; color:#fff; background:rgba(255,255,255,0.18); padding:10px 18px; border:1px solid #fff;">4
                    SPRINTS · 8 SEMANAS</span>
                <span
                    style="font-family:var(--font-mono); font-size:14px; letter-spacing:0.1em; color:#fff; background:rgba(255,255,255,0.18); padding:10px 18px; border:1px solid #fff;">GITHUB
                    PROJECTS</span>
                <span
                    style="font-family:var(--font-mono); font-size:14px; letter-spacing:0.1em; color:#fff; background:rgba(255,255,255,0.18); padding:10px 18px; border:1px solid #fff;">QUADRO
                    9</span>
            </div>
        </div>

        <!-- Bottom chrome -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:1024px; width:1792px; height:20px; z-index:20;">
            <div
                style="display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:12px; letter-spacing:0.18em; color:#fff; opacity:0.85; text-transform:uppercase;">
                <span>Aula 24 · Planejamento e Cronograma</span>
                <span style="color:#fff; font-weight:500;">13</span>
            </div>
        </div>

    </div>
</body>

</html>
