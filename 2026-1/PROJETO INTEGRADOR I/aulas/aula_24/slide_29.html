<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Encerramento</title>
    <link rel="stylesheet" href="./assets/chrome.css">
</head>

<body>
    <div class="slide-container" data-screen-label="29 Encerramento"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--ink);">

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:40px; width:900px; height:24px; z-index:20;">
            <div
                style="display:flex; align-items:center; gap:18px; font-family:var(--font-mono); font-size:14px; letter-spacing:0.12em; color:#A8A096; text-transform:uppercase;">
                <span
                    style="width:8px; height:8px; background:var(--accent); border-radius:50%; display:inline-block;"></span>
                <span>Encerramento</span>
            </div>
        </div>

        <!-- Confetti / sprint bars decoração -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:880px; width:1920px; height:200px; z-index:2;">
            <svg width="1920" height="200" viewBox="0 0 1920 200" xmlns="http://www.w3.org/2000/svg">
                <rect x="40" y="40" width="220" height="32" fill="#1F4A4F" />
                <rect x="280" y="40" width="280" height="32" fill="#E2613B" />
                <rect x="580" y="40" width="240" height="32" fill="#C9A24C" />
                <rect x="840" y="40" width="320" height="32" fill="#5A7A3C" />
                <rect x="1180" y="40" width="160" height="32" fill="#1F4A4F" opacity="0.5" />
                <rect x="1360" y="40" width="240" height="32" fill="#E2613B" opacity="0.5" />
                <rect x="1620" y="40" width="200" height="32" fill="#C9A24C" opacity="0.5" />
            </svg>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:160px; width:1700px; height:60px; z-index:10;">
            <div
                style="font-family:var(--font-mono); font-size:18px; letter-spacing:0.22em; text-transform:uppercase; color:var(--accent);">
                / Capítulo 5 · Encerrado.</div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:240px; width:1800px; height:480px; z-index:10;">
            <div
                style="font-family:var(--font-display); font-weight:600; font-size:140px; line-height:0.95; letter-spacing:-0.03em; color:#fff;">
                Da especificação<br>
                à execução —<br>
                <span style="color:var(--accent);">o projeto agora<br>é demonstrável.</span>
            </div>
        </div>

        <!-- Próxima aula -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:64px; top:740px; width:1792px; height:120px; background:#2A2A2A; border-left:6px solid var(--accent); z-index:5;">
        </div>
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:765px; width:1700px; height:40px; z-index:10;">
            <div
                style="font-family:var(--font-mono); font-size:14px; letter-spacing:0.2em; color:var(--accent); text-transform:uppercase;">
                Próximos passos</div>
        </div>
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:805px; width:1700px; height:50px; z-index:10;">
            <div style="font-family:var(--font-display); font-weight:500; font-size:30px; color:#fff;">
                Próxima aula: <strong style="color:var(--accent);">Sprint 1 começa</strong> — abrindo o repositório e
                modelando os dados.
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:64px; top:1024px; width:1792px; height:20px; z-index:20;">
            <div
                style="display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:12px; letter-spacing:0.18em; color:#A8A096; text-transform:uppercase;">
                <span>Aula 24 · Planejamento e Cronograma</span>
                <span style="color:#fff; font-weight:500;">29</span>
            </div>
        </div>

    </div>
</body>

</html>
