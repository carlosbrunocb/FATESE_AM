<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Capa</title>
  <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
  <div class="slide-container" data-screen-label="01 Capa">

    <!-- Bloco gráfico decorativo (coral à direita) -->
    <div data-object="true" data-object-type="shape"
      style="position:absolute; left:1280px; top:0px; width:640px; height:1080px; background:var(--coral); z-index:1;">
    </div>

    <!-- Marca tipográfica grande sobre o bloco coral -->
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:1320px; top:80px; width:560px; height:120px; z-index:10;">
      <div
        style="font-family:var(--mono); font-size:14px; letter-spacing:0.22em; text-transform:uppercase; color:#fdece6; font-weight:600;">
        Projeto Integrador · Aula 25
      </div>
      <div
        style="font-family:var(--serif); font-size:120px; font-weight:900; color:#fff; line-height:1; margin-top:14px; letter-spacing:-0.04em;">
        MVP
      </div>
    </div>

    <!-- Sublegenda no bloco coral -->
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:1320px; top:340px; width:520px; z-index:10;">
      <div
        style="font-family:var(--serif); font-style:italic; font-weight:400; font-size:34px; color:#fff5f0; line-height:1.2;">
        o menor produto<br />que ainda funciona.
      </div>
    </div>

    <!-- Linha de medição decorativa -->
    <div data-object="true" data-object-type="shape"
      style="position:absolute; left:1320px; top:980px; width:80px; height:2px; background:#fff; z-index:10;"></div>
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:1320px; top:995px; width:520px; z-index:10;">
      <div
        style="font-family:var(--mono); font-size:12px; letter-spacing:0.2em; color:#fdece6; text-transform:uppercase;">
        Cap. 6 · Dossiê
      </div>
    </div>

    <!-- Lado esquerdo: título principal -->
    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:80px; width:520px; z-index:10;">
      <div class="eyebrow">Aula 25 / 32</div>
    </div>

    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:380px; width:1100px; z-index:10;">
      <div
        style="font-family:var(--serif); font-size:108px; font-weight:700; line-height:0.98; letter-spacing:-0.025em; color:var(--ink);">
        Protótipo<br />Inicial.
      </div>
    </div>

    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:680px; width:1100px; z-index:10;">
      <div
        style="font-family:var(--serif); font-style:italic; font-weight:400; font-size:42px; line-height:1.2; color:var(--ink-soft);">
        Conceito de MVP e<br />Planejamento de Telas
      </div>
    </div>

    <!-- Linha + assinatura do professor -->
    <div data-object="true" data-object-type="shape"
      style="position:absolute; left:120px; top:890px; width:560px; height:1px; background:var(--ink); z-index:10;">
    </div>

    <div data-object="true" data-object-type="textbox"
      style="position:absolute; left:120px; top:910px; width:560px; z-index:10;">
      <div
        style="font-family:var(--sans); font-size:18px; color:var(--mute); letter-spacing:0.06em; text-transform:uppercase; font-weight:500;">
        Prof. Carlos Bruno Oliveira Lopes
      </div>
      <div style="font-family:var(--sans); font-size:16px; color:var(--mute); margin-top:6px;">
        Análise e Desenvolvimento de Sistemas · FATESE
      </div>
    </div>

  </div>
</body>

</html>
