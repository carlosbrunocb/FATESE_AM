<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Pergunta de abertura</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="04 Abertura" style="background:var(--ink);">

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:56px; width:1760px; z-index:10;">
            <div
                style="font-family:var(--mono); font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#888;">
                <span style="color:var(--coral);">●</span> &nbsp; Abertura &middot; 5 min
            </div>
        </div>

        <!-- Aspas decorativas grandes -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:140px; width:200px; z-index:10;">
            <div
                style="font-family:var(--serif); font-size:280px; line-height:0.7; color:var(--coral); font-weight:700;">
                &ldquo;</div>
        </div>

        <!-- Pergunta -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:280px; top:280px; width:1500px; z-index:10;">
            <div
                style="font-family:var(--serif); font-size:96px; font-weight:600; color:#fff; line-height:1.05; letter-spacing:-0.02em;">
                No dia da apresentação,<br />
                o que a <span style="color:var(--coral);">banca</span><br />
                realmente quer ver?
            </div>
        </div>

        <!-- Resposta provocadora em duas linhas -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:280px; top:760px; width:60px; height:2px; background:var(--coral); z-index:5;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:280px; top:790px; width:1400px; z-index:10;">
            <div style="font-family:var(--sans); font-size:30px; color:#d0c8bd; line-height:1.45; font-weight:300;">
                Não é um sistema completo, com todos os botões funcionando.<br />
                É <strong style="color:#fff; font-weight:600;">a prova de que o núcleo do negócio &mdash; aquilo que
                    resolve a dor real do usuário &mdash; foi pensado, validado e está navegável.</strong>
            </div>
        </div>

        <!-- Rodapé escuro -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:1020px; width:1760px; z-index:10;">
            <div
                style="font-family:var(--sans); font-size:14px; color:#666; letter-spacing:0.08em; text-transform:uppercase; display:flex; justify-content:space-between; border-top:1px solid #333; padding-top:14px;">
                <span style="font-weight:600;">FATESE <span style="color:var(--coral);">·</span> Projeto
                    Integrador</span>
                <span style="font-family:var(--mono); font-size:13px;">04 / 34</span>
            </div>
        </div>

    </div>
</body>

</html>
