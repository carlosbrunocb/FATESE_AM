<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>O que é MVP</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="06 O que é MVP">

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:56px; width:1760px; z-index:10;">
            <div class="chrome-topmark"><span class="accent">Parte 1</span> · Fundamentação</div>
        </div>

        <!-- Etiqueta de capítulo -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:160px; width:600px; z-index:10;">
            <div class="eyebrow">Definição</div>
        </div>

        <!-- Sigla gigante MVP -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:220px; width:1700px; z-index:10;">
            <div
                style="font-family:var(--serif); font-size:360px; font-weight:900; line-height:0.85; letter-spacing:-0.04em; color:var(--ink);">
                M<span style="color:var(--coral);">V</span>P
            </div>
        </div>

        <!-- Decodificação da sigla -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:620px; width:1700px; z-index:10;">
            <div
                style="display:flex; gap:80px; font-family:var(--serif); font-size:42px; font-weight:600; color:var(--ink); letter-spacing:-0.01em;">
                <div>
                    <span style="color:var(--coral); font-weight:900;">M</span>inimum
                </div>
                <div>
                    <span style="color:var(--coral); font-weight:900;">V</span>iable
                </div>
                <div>
                    <span style="color:var(--coral); font-weight:900;">P</span>roduct
                </div>
            </div>
            <div
                style="font-family:var(--sans); font-size:22px; color:var(--mute); margin-top:14px; letter-spacing:0.02em;">
                <span style="display:inline-block; width:330px;">Mínimo</span>
                <span style="display:inline-block; width:330px;">Viável</span>
                <span>Produto</span>
            </div>
        </div>

        <!-- Bloco de definição em destaque -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:120px; top:780px; width:1700px; height:180px; background:var(--cream-soft); border:1px solid var(--line); z-index:1;">
        </div>
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:120px; top:780px; width:6px; height:180px; background:var(--coral); z-index:5;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:160px; top:805px; width:1640px; height:140px; z-index:10;">
            <div
                style="font-family:var(--mono); font-size:13px; letter-spacing:0.2em; color:var(--coral-deep); text-transform:uppercase; font-weight:700;">
                Em uma frase
            </div>
            <div
                style="font-family:var(--serif); font-style:italic; font-size:34px; line-height:1.3; color:var(--ink); margin-top:10px; font-weight:500;">
                É a menor versão funcional do produto capaz de entregar valor real ao usuário<br />e gerar aprendizado
                validado para a equipe &mdash; com o mínimo esforço possível.
            </div>
        </div>

        <div class="chrome-footer">
            <span class="chrome-brand">FATESE <span class="dot">·</span> Projeto Integrador</span>
            <span class="chrome-page">06 / 34</span>
        </div>

    </div>
</body>

</html>
