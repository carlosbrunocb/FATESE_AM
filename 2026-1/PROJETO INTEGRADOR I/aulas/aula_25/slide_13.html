<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Níveis de fidelidade</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="13 Fidelidade" style="background:var(--ink);">

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:56px; width:1760px; z-index:10;">
            <div
                style="font-family:var(--mono); font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#888;">
                <span style="color:var(--coral);">●</span> &nbsp; Parte 2 &middot; Prototipagem
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:280px; width:1700px; z-index:10;">
            <div
                style="font-family:var(--mono); font-size:14px; letter-spacing:0.22em; text-transform:uppercase; color:var(--coral); font-weight:600;">
                Três níveis de fidelidade
            </div>
            <div
                style="font-family:var(--serif); font-size:120px; font-weight:700; line-height:1; color:#fff; margin-top:28px; letter-spacing:-0.025em;">
                Do esqueleto<br />à <em style="color:var(--coral); font-style:italic;">simulação</em> real.
            </div>
            <div
                style="font-family:var(--serif); font-style:italic; font-size:30px; color:#d0c8bd; margin-top:40px; line-height:1.4; max-width:1400px; font-weight:400;">
                Cada nível serve a um momento da maturação da ideia. Escolher o nível certo é tão importante quanto
                escolher a ferramenta certa.
            </div>
        </div>

        <!-- Marcadores embaixo -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:880px; width:1700px; z-index:10;">
            <div style="display:flex; gap:40px; align-items:center;">
                <div style="display:flex; gap:14px; align-items:center;">
                    <div style="width:14px; height:14px; background:#888;"></div>
                    <span
                        style="font-family:var(--mono); font-size:14px; color:#888; letter-spacing:0.1em; text-transform:uppercase;">Wireframe</span>
                </div>
                <div style="font-family:var(--serif); font-size:24px; color:#444;">→</div>
                <div style="display:flex; gap:14px; align-items:center;">
                    <div style="width:14px; height:14px; background:var(--ochre);"></div>
                    <span
                        style="font-family:var(--mono); font-size:14px; color:#ccc; letter-spacing:0.1em; text-transform:uppercase;">Mockup</span>
                </div>
                <div style="font-family:var(--serif); font-size:24px; color:#444;">→</div>
                <div style="display:flex; gap:14px; align-items:center;">
                    <div style="width:14px; height:14px; background:var(--coral);"></div>
                    <span
                        style="font-family:var(--mono); font-size:14px; color:#fff; letter-spacing:0.1em; text-transform:uppercase;">Protótipo
                        navegável</span>
                </div>
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:1020px; width:1760px; z-index:10;">
            <div
                style="font-family:var(--sans); font-size:14px; color:#666; letter-spacing:0.08em; text-transform:uppercase; display:flex; justify-content:space-between; border-top:1px solid #333; padding-top:14px;">
                <span style="font-weight:600;">FATESE <span style="color:var(--coral);">·</span> Projeto
                    Integrador</span>
                <span style="font-family:var(--mono); font-size:13px;">13 / 34</span>
            </div>
        </div>

    </div>
</body>

</html>
