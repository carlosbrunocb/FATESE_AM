<!doctype html>
<html lang="pt-BR">

<head>

    <title>Workshop - instruções</title>

</head>

<body>
    <div class="slide-container" data-screen-label="27 Workshop" style="background:var(--coral);">

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:56px; width:1760px; z-index:10;">
            <div
                style="font-family:var(--mono); font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#fff5f0;">
                <span style="color:#fff;">●</span> &nbsp; Parte 6 &middot; Atividade prática
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:240px; width:1700px; z-index:10;">
            <div
                style="font-family:var(--mono); font-size:14px; letter-spacing:0.22em; text-transform:uppercase; color:#fff; font-weight:600; opacity:0.8;">

            </div>
            <div

                Workshop.
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:680px; width:1100px; z-index:10;">
            <div
                style="font-family:var(--serif); font-style:italic; font-size:40px; color:#fff5f0; line-height:1.3; font-weight:400;">
                Vocês têm uma missão clara:<br />
                <strong style="font-style:normal; color:#fff;">mapear o Caminho Feliz</strong> do seu próprio
                projeto<br />e escrever o subcapítulo 6.1 do Dossiê.
            </div>
        </div>

        <!-- Card de metas -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:1340px; top:680px; width:480px; height:280px; background:var(--ink); z-index:5;">
        </div>
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:1380px; top:710px; width:400px; z-index:10;">
            <div
                style="font-family:var(--mono); font-size:13px; letter-spacing:0.2em; color:var(--coral); text-transform:uppercase; font-weight:700;">
                Entregáveis</div>
            <div style="margin-top:18px;">
                <div style="display:flex; gap:14px; padding:10px 0; border-bottom:1px solid #333;">
                    <span style="color:var(--coral); font-weight:700; font-family:var(--mono);">①</span>
                    <span style="font-family:var(--sans); font-size:18px; color:#fff;">Lista do Caminho Feliz</span>
                </div>
                <div style="display:flex; gap:14px; padding:10px 0; border-bottom:1px solid #333;">
                    <span style="color:var(--coral); font-weight:700; font-family:var(--mono);">②</span>
                    <span style="font-family:var(--sans); font-size:18px; color:#fff;">Texto do subcapítulo 6.1</span>
                </div>
                <div style="display:flex; gap:14px; padding:10px 0;">
                    <span style="color:var(--coral); font-weight:700; font-family:var(--mono);">③</span>
                    <span style="font-family:var(--sans); font-size:18px; color:#fff;">Justificativa da
                        ferramenta</span>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:80px; top:1020px; width:1760px; z-index:10;">
            <div
                style="font-family:var(--sans); font-size:14px; color:#fff5f0; letter-spacing:0.08em; text-transform:uppercase; display:flex; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.3); padding-top:14px; opacity:0.8;">
                <span style="font-weight:600;">FATESE &middot; Projeto Integrador</span>
                <span style="font-family:var(--mono); font-size:13px;">27 / 34</span>
            </div>
        </div>

    </div>
