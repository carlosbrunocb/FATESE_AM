<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Apresentação - Estação de Qualidade do Ar</title>

    <style>
        body {
            margin: 0;
            background: #0d1117;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Layout principal */
        .layout {
            display: grid;
            grid-template-rows: 1fr 40px;
            height: 100vh;
        }

        /* Área do slide */
        .slide-area {
            position: relative;
            background: #0d1117;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Crucial para esconder as sobras do iframe e evitar barra de rolagem */
        }

        /* O Iframe agora tem tamanho fixo, a escala será feita via CSS/JS */
        iframe {
            position: absolute;
            width: 1920px;  /* Resolução base dos seus slides */
            height: 1080px; /* Resolução base dos seus slides */
            border: none;
            display: block;
            transform-origin: 0 0; /* Fixa o ponto de origem da escala no topo esquerdo */
        }

        /* Barra inferior */
        .control-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
            z-index: 10;
        }

        /* Contador */
        .counter {
            color: #8b949e;
            font-size: 12px;
            font-weight: 500;
        }

        /* Botões */
        .controls {
            display: flex;
            gap: 10px;
        }

        .controls button {
            background: #0d1117;
            color: #3DDC84;
            border: 1px solid #3DDC84;
            padding: 6px 14px;
            font-size: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .controls button:hover {
            background: #3DDC84;
            color: #0d1117;
        }
        
        button:focus { outline: none; }
    </style>
</head>

<body>

    <div class="layout">
        <div class="slide-area">
            <iframe id="slideFrame"></iframe>
        </div>

        <div class="control-bar">
            <div class="counter" id="counter"></div>
            <div class="controls">
                <button onclick="prevSlide()" title="Seta Esquerda">⟵ Anterior</button>
                <button onclick="nextSlide()" title="Seta Direita">Próximo ⟶</button>
            </div>
        </div>
    </div>

    <script>
        const slides = [
            'slide_01.html', 'slide_02.html', 'slide_03.html', 'slide_04.html',
            'slide_05.html', 'slide_06.html', 'slide_07.html', 'slide_08.html',
            'slide_09.html', 'slide_10.html', 'slide_11.html', 'slide_12.html',
            'slide_13.html', 'slide_14.html', 'slide_15.html', 'slide_16.html',
            'slide_17.html', 'slide_18.html', 'slide_19.html', 'slide_20.html',
            'slide_21.html', 'slide_22.html', 'slide_23.html', 'slide_24.html',
            'slide_25.html', 'slide_26.html', 'slide_27.html', 'slide_28.html',
            'slide_29.html', 'slide_30.html', 'slide_31.html'
        ];

        let current = 0;
        const frame = document.getElementById('slideFrame');
        const counter = document.getElementById('counter');

        // --- SISTEMA DE ESCALA AUTOMÁTICA (NOVO) ---
        function resizeSlide() {
            const slideArea = document.querySelector('.slide-area');
            
            // 1. Resolução original que você projetou os slides
            const baseWidth = 1920;
            const baseHeight = 1080;

            // 2. Tamanho da tela/área disponível no momento
            const containerWidth = slideArea.clientWidth;
            const containerHeight = slideArea.clientHeight;

            // 3. Descobre qual proporção usar para não cortar nem distorcer a imagem
            const scale = Math.min(containerWidth / baseWidth, containerHeight / baseHeight);

            // 4. Calcula qual vai ser o tamanho final do slide na tela
            const scaledWidth = baseWidth * scale;
            const scaledHeight = baseHeight * scale;

            // 5. Calcula as margens para deixar o slide perfeitamente centralizado
            const left = (containerWidth - scaledWidth) / 2;
            const top = (containerHeight - scaledHeight) / 2;

            // 6. Aplica a transformação via CSS
            frame.style.transform = `translate(${left}px, ${top}px) scale(${scale})`;
        }

        // Recalcula a escala sempre que a janela do navegador mudar de tamanho
        window.addEventListener('resize', resizeSlide);
        // ------------------------------------------

        function handleKeyboard(e) {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        }

        document.addEventListener('keydown', handleKeyboard);

        frame.onload = function() {
            try {
                const iframeDoc = frame.contentDocument || frame.contentWindow.document;
                iframeDoc.addEventListener('keydown', handleKeyboard);
                frame.contentWindow.focus();
            } catch (err) {
                console.log('Nota: Cross-origin policy pode bloquear acesso ao iframe se não estiver rodando em servidor local/web.');
            }
        };

        function loadSlide() {
            frame.src = slides[current];
            updateCounter();
            resizeSlide(); // Força a escala na hora que carrega o slide
        }

        function updateCounter() {
            counter.textContent = `Slide ${current + 1} de ${slides.length}`;
        }

        function nextSlide() {
            if (current < slides.length - 1) {
                current++;
                loadSlide();
            }
        }

        function prevSlide() {
            if (current > 0) {
                current--;
                loadSlide();
            }
        }

        // Carrega o primeiro slide e ajusta o tamanho
        loadSlide();
        resizeSlide(); 
    </script>

</body>
</html>
