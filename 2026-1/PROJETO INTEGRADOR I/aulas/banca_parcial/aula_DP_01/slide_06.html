<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AdoptMatch - Adoção por Afinidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;family=Open+Sans:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
        }

        .slide-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        .header-bar {
            background: linear-gradient(90deg, #0066CC 0%, #FF6600 100%);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        .header-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 32pt;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        .header-subtitle {
            font-size: 14pt;
            color: rgba(255, 255, 255, 0.9);
            margin-left: 20px;
        }

        .main-content {
            padding: 30px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100% - 80px);
            box-sizing: border-box;
        }

        .project-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 90%;
            max-width: 1000px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #0066CC, #FF6600);
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FF6600, #FF8C00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3);
        }

        .logo-icon i {
            font-size: 40pt;
            color: white;
        }

        .project-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 36pt;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        .project-tagline {
            font-size: 18pt;
            color: #64748b;
            margin-top: 10px;
            font-style: italic;
        }

        .team-section {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .team-member {
            background: #f8fafc;
            border-radius: 12pt;
            padding: 15px 25px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-member i {
            color: #0066CC;
            font-size: 16pt;
        }

        .team-member span {
            font-size: 14pt;
            color: #1e293b;
            font-weight: 500;
        }

        .course-info {
            margin-top: 25px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .course-info i {
            color: #0066CC;
            font-size: 18pt;
        }

        .course-info span {
            font-size: 14pt;
            color: #1e293b;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28pt;
            font-weight: 700;
            color: #0066CC;
        }

        .stat-label {
            font-size: 12pt;
            color: #64748b;
        }

        .floating-hearts {
            position: absolute;
            top: 20px;
            right: 30px;
            opacity: 0.1;
        }

        .floating-hearts i {
            font-size: 40pt;
            color: #FF6600;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="header-bar">
            <div style="display: flex; align-items: center;">
                <span class="header-title">AdoptMatch</span>
                <span class="header-subtitle">Adoção por Afinidade</span>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span style="color: white; font-size: 14pt;"><i class="fas fa-user"></i> Prof. Carlos Bruno</span>
                <span style="color: white; font-size: 14pt;"><i class="fas fa-calendar"></i> 12/04/2026</span>
            </div>
        </div>
        <div class="main-content">
            <div class="project-card">
                <div class="floating-hearts">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="logo-container">
                    <div class="logo-icon">
                        <i class="fas fa-paw"></i>
                    </div>
                    <div>
                        <div class="project-name">AdoptMatch</div>
                        <div class="project-tagline">"Adotar com consciência começa pelo match certo"</div>
                    </div>
                </div>
                <div class="stats-container">
                    <div class="stat-item">
                        <div class="stat-value">40%</div>
                        <div class="stat-label">Redução de devolução</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">10</div>
                        <div class="stat-label">Perguntas do quiz</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">100%</div>
                        <div class="stat-label">Match inteligente</div>
                    </div>
                </div>
                <div class="team-section">
                    <div class="team-member">
                        <i class="fas fa-user"></i>
                        <span>Ana Ribeiro</span>
                    </div>
                    <div class="team-member">
                        <i class="fas fa-user"></i>
                        <span>João Martins</span>
                    </div>
                    <div class="team-member">
                        <i class="fas fa-user"></i>
                        <span>Luiza Prado</span>
                    </div>
                    <div class="team-member">
                        <i class="fas fa-user"></i>
                        <span>Marcos Tavares</span>
                    </div>
                </div>
                <div class="course-info">
                    <i class="fas fa-graduation-cap"></i>
                    <span>ADS - FATESE | 2026/1 | Turma A</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
