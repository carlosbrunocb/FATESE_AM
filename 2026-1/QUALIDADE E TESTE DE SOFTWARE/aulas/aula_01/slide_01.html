<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Capa - Introdução à Qualidade de Software</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&amp;family=Open+Sans:wght@400;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            /* ALTERAÇÃO: Ocupa toda a janela */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .slide-container {
            /* ALTERAÇÃO: Responsivo para tela cheia */
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #ffffff;
            overflow: hidden;
            display: flex;
        }

        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }

        .font-opensans {
            font-family: 'Open Sans', sans-serif;
        }

        .senac-blue {
            color: #003DA5;
        }

        .bg-senac-blue {
            background-color: #003DA5;
        }

        .accent-bar {
            position: absolute;
            left: 0;
            top: 60px;
            width: 120px;
            height: 8px;
            background-color: #F68D2E;
            /* Orange accent common in SENAC branding */
            border-radius: 0 4px 4px 0;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        /* Diagonal split background */
        .sidebar-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 35%;
            height: 100%;
            background-color: #003DA5;
            clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="slide-container shadow-2xl">
        <div class="flex-1 flex flex-col justify-center pl-20 pr-10 z-10 relative">
            <div class="accent-bar"></div>
            <div class="mb-4">
                <p class="font-opensans text-gray-500 font-semibold tracking-wider uppercase text-sm mb-1">
                    Análise e Desenvolvimento de Sistemas
                </p>
                <p class="font-opensans text-gray-400 text-sm">
                    Faculdade do SENAC
                </p>
            </div>
            <div class="mt-8 mb-12">
                <div
                    class="inline-block bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded text-xs mb-4 font-montserrat tracking-widest uppercase">
                    Aula 01
                </div>
                <h1 class="font-montserrat font-extrabold text-6xl text-gray-800 leading-tight mb-4">
                    Introdução à <br />
                    <span class="senac-blue">Qualidade de Software</span>
                </h1>
                <h2 class="font-opensans text-2xl text-gray-600 font-light border-l-4 border-gray-300 pl-4 mt-4">
                    Disciplina: Qualidade e Teste de Software
                </h2>
            </div>
            <div class="mt-auto mb-16 flex items-center">
                <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 mr-4">
                    <i class="fas fa-chalkboard-teacher text-xl"></i>
                </div>
                <div>
                    <p class="font-montserrat font-bold text-gray-800 text-lg">
                        Prof. Carlos Bruno Oliveira Lopes
                    </p>
                    <p class="font-opensans text-gray-500 text-sm">
                        Docente
                    </p>
                </div>
            </div>
        </div>
        <div class="sidebar-right shadow-lg">
            <img alt="Coding Background" class="absolute w-full h-full object-cover opacity-20 mix-blend-overlay"
                src="https://page.gensparksite.com/slides_images/441b96c9a14f60e6e15053807bf6cdb9.webp" />
            <div class="decorative-circle bg-white w-64 h-64 -top-10 -right-10"></div>
            <div class="decorative-circle bg-white w-32 h-32 bottom-20 left-10"></div>
            <div class="relative z-10 text-center text-white p-8">
                <div
                    class="mb-6 mx-auto w-32 h-32 bg-white bg-opacity-20 rounded-full flex items-center justify-center border-4 border-white border-opacity-30">
                    <i class="fas fa-bug text-6xl text-white"></i>
                </div>
                <h3 class="font-montserrat font-bold text-2xl mb-2">Fundamentos &amp;<br />Conceitos</h3>
                <div class="w-16 h-1 bg-white mx-auto mt-4 mb-4 rounded"></div>
                <p class="font-opensans text-blue-100 text-sm opacity-90">
                    Erro • Defeito • Falha<br />
                    Custo do Bug
                </p>
            </div>
        </div>
    </div>
</body>

</html>
