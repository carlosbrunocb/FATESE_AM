<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Capa Institucional - Aula 02</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;family=Roboto:wght@300;400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            /* ALTERAÇÃO AQUI: Mudado de pixels fixos para Viewport Units */
            width: 100vw;  /* 100% da largura da janela */
            height: 100vh; /* 100% da altura da janela */
            overflow: hidden; /* Impede barras de rolagem */
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5f5;
        }

        .senac-blue {
            color: #004A97;
        }

        .bg-senac-blue {
            background-color: #004A97;
        }

        .senac-orange {
            color: #F37021;
        }

        .bg-senac-orange {
            background-color: #F37021;
        }

        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }

        /* Decorative shapes */
        .shape-circle {
            position: absolute;
            border-radius: 50%;
            z-index: 0;
        }
    </style>
</head>

<body class="flex flex-col">
    <div class="relative w-full h-full bg-white flex overflow-hidden">
        <div class="w-1/3 bg-senac-blue relative flex flex-col justify-between p-12 text-white z-10">
            <div class="absolute top-0 left-0 w-full h-full opacity-10"
                style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 20px 20px;">
            </div>
            <div class="relative z-10">
                <div class="inline-block bg-senac-orange px-4 py-1 rounded mb-6 shadow-md">
                    <p class="text-white font-bold tracking-wider uppercase text-sm">Faculdade SENAC</p>
                </div>
                <h2 class="text-5xl font-montserrat font-bold mb-4 opacity-90">Aula<br /><span
                        class="text-senac-orange text-8xl">02</span></h2>
            </div>
            <div class="relative z-10 mt-auto">
                <div class="border-l-4 border-senac-orange pl-4">
                    <p class="text-sm font-light opacity-80 uppercase tracking-widest mb-1">Professor</p>
                    <p class="text-xl font-bold">Carlos Bruno<br />Oliveira Lopes</p>
                </div>
            </div>
            <div
                class="absolute -right-16 top-1/2 transform -translate-y-1/2 w-32 h-32 bg-senac-orange rounded-full opacity-20">
            </div>
        </div>
        <div class="w-2/3 flex flex-col justify-center p-16 relative z-10">
            <div class="absolute top-0 right-0 w-64 h-4 bg-senac-orange"></div>
            <div class="absolute top-4 right-0 w-48 h-4 bg-senac-blue"></div>
            <div class="flex-1 flex flex-col justify-center">
                <p class="text-gray-500 font-medium uppercase tracking-widest mb-2 flex items-center gap-2">
                    <i class="fas fa-layer-group text-senac-orange"></i>
                    Análise e Desenvolvimento de Sistemas
                </p>
                <h1 class="text-5xl font-montserrat font-extrabold text-gray-800 leading-tight mb-6">
                    Ciclo de Vida de <span class="text-senac-blue">Desenvolvimento</span> (SDLC) vs. <span
                        class="text-senac-orange">Ciclo de Vida de Teste</span> (STLC)
                </h1>
                <div class="w-24 h-2 bg-senac-blue mb-8 rounded-full"></div>
                <div
                    class="flex items-center gap-4 bg-gray-50 p-6 rounded-lg border-l-4 border-senac-blue shadow-sm w-full">
                    <div class="bg-white p-3 rounded-full shadow-md text-senac-blue">
                        <i class="fas fa-check-double text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-bold uppercase">Disciplina</p>
                        <p class="text-xl font-medium text-gray-800">Qualidade e Teste de Software</p>
                    </div>
                </div>
            </div>
            <div class="absolute bottom-0 right-0 w-32 h-32 bg-gray-100 rounded-tl-full -z-10"></div>
        </div>
    </div>
</body>

</html>
