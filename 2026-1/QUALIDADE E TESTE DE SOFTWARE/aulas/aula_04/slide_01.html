<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Aula 04 - Testes Estáticos</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&amp;family=Roboto:wght@300;400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .slide-container {
            /* Alterado para ocupar toda a janela (View Width / View Height) */
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #0055A4;
            position: relative;
            overflow: hidden;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
            position: relative;
            z-index: 2;
        }

        .logo-area {
            position: absolute;
            top: 30px;
            right: 40px;
            width: 120px;
            height: 120px;
            background-color: white;
            border-radius: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px; /* Reduzi um pouco o padding para dar mais espaço à imagem */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Classe nova para controlar a imagem da logo */
        .logo-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Garante que a logo inteira apareça sem distorcer */
            display: block;
        }

        /* Classe antiga .logo-text removida pois não será usada */

        .title-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .aula-number {
            font-size: 24px;
            font-weight: 600;
            color: #FFD700;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .main-title {
            font-size: 48px;
            font-weight: 700;
            color: white;
            line-height: 1.3;
            margin-bottom: 20px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 26px;
            font-weight: 400;
            color: #E0E0E0;
            margin-top: 10px;
        }

        .info-section {
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 35px 50px;
            margin-top: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            min-width: 700px;
        }

        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            color: white;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 18px;
            color: #FFD700;
        }

        .info-label {
            font-weight: 600;
            font-size: 16px;
            margin-right: 10px;
            color: #FFD700;
        }

        .info-value {
            font-weight: 400;
            font-size: 16px;
            color: white;
        }

        .decorative-element {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            z-index: 1;
        }

        .decorative-element-1 {
            top: -150px;
            left: -150px;
        }

        .decorative-element-2 {
            bottom: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
        }

        .code-icon-bg {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-size: 120px;
            color: rgba(255, 255, 255, 0.08);
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="decorative-element decorative-element-1"></div>
        <div class="decorative-element decorative-element-2"></div>
        <i class="fas fa-code code-icon-bg"></i>
        
        <div class="logo-area">
            <img src="imagens/Senac_logo.svg.png" alt="Logo SENAC" class="logo-img">
        </div>
        
        <div class="content-wrapper">
            <div class="title-section">
                <p class="aula-number">AULA 04</p>
                <h1 class="main-title">
                    <p>Testes Estáticos</p>
                </h1>
                <p class="subtitle">Revisão de código, inspeção e walkthrough</p>
            </div>
            <div class="info-section">
                <div class="info-row">
                    <div class="info-icon">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <p class="info-label">Professor:</p>
                    <p class="info-value">Carlos Bruno Oliveira Lopes</p>
                </div>
                <div class="info-row">
                    <div class="info-icon">
                        <i class="fas fa-university"></i>
                    </div>
                    <p class="info-label">Instituição:</p>
                    <p class="info-value">Faculdade SENAC</p>
                </div>
                <div class="info-row">
                    <div class="info-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <p class="info-label">Curso:</p>
                    <p class="info-value">Análise e Desenvolvimento de Sistemas</p>
                </div>
                <div class="info-row">
                    <div class="info-icon">
                        <i class="fas fa-book"></i>
                    </div>
                    <p class="info-label">Disciplina:</p>
                    <p class="info-value">Qualidade e Teste de Software</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
