<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sessão Complementar</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #0055A4;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, #0055A4 0%, #003060 100%);
            overflow: hidden;
        }

        /* Elementos Decorativos de Fundo */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            z-index: 1;
        }
        .c1 { width: 600px; height: 600px; top: -200px; left: -200px; }
        .c2 { width: 400px; height: 400px; bottom: -100px; right: -100px; }

        .bg-icon {
            position: absolute;
            font-size: 400px;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
            transform: rotate(-15deg);
        }

        /* Conteúdo Central */
        .content-box {
            z-index: 10;
            text-align: center;
            color: white;
            animation: fadeInUp 0.8s ease-out;
        }

        .tag-pill {
            display: inline-block;
            background-color: #FFD700;
            color: #003060;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .main-title {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 10px;
            line-height: 1.1;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-family: 'Roboto', sans-serif;
            font-size: 24px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 20px;
            display: inline-block;
        }

        .logo-corner {
            position: absolute;
            bottom: 40px;
            right: 60px;
            opacity: 0.8;
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 15px;
        }
        
        .logo-corner img { max-width: 80%; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="bg-circle c1"></div>
        <div class="bg-circle c2"></div>
        <i class="fas fa-layer-group bg-icon"></i>

        <div class="content-box">
            <div class="tag-pill">AULA 04 - BÔNUS</div>
            <h1 class="main-title">
                SESSÃO<br>COMPLEMENTAR
            </h1>
            <div class="subtitle">
                Guia Prático de Ferramentas & Glossário Técnico
            </div>
        </div>

        <div class="logo-corner">
            <img src="imagens/Senac_logo.svg.png" alt="Logo">
        </div>
    </div>
</body>
</html>
