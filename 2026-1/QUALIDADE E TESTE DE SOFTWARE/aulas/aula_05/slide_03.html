<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Agenda da Aula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        .header-section {
            background-color: #f1f5f9;
            width: 100%;
            height: 140px;
            padding: 40px 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 4px solid #2563EB;
        }

        .content-section {
            padding: 40px 80px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .bullet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 60px;
            row-gap: 15px;
        }

        .bullet-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .bullet-icon {
            min-width: 45px;
            height: 45px;
            background-color: #e0e7ff;
            color: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            font-size: 1.2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .bullet-text {
            font-size: 1.35rem;
            color: #334155;
            font-weight: 400;
            line-height: 1.3;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            z-index: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="slide-container flex-col" id="slide">
        <div class="header-section">
            <div>
                <p class="text-blue-600 font-bold uppercase tracking-widest text-sm mb-1">Aula 05</p>
                <h1 class="text-5xl font-black text-slate-800 font-['Montserrat']">Agenda</h1>
            </div>
            <div class="text-slate-400 text-6xl opacity-20">
                <i class="fas fa-list-ol"></i>
            </div>
        </div>
        <div class="content-section relative">
            <div class="decorative-circle bg-blue-50 w-64 h-64 -right-20 top-20 opacity-50"></div>
            <div class="decorative-circle bg-indigo-50 w-40 h-40 left-10 bottom-10 opacity-50"></div>
            <div class="relative z-10 w-full bullet-grid">
                <div class="bullet-item" style="animation-delay: 0.1s;">
                    <div class="bullet-icon"><i class="fas fa-book-open"></i></div>
                    <p class="bullet-text">Conceitos básicos: Testes de Unidade e TDD</p>
                </div>
                <div class="bullet-item" style="animation-delay: 0.2s;">
                    <div class="bullet-icon"><i class="fas fa-sync"></i></div>
                    <p class="bullet-text">Ciclo Red-Green-Refactor</p>
                </div>
                <div class="bullet-item" style="animation-delay: 0.3s;">
                    <div class="bullet-icon"><i class="fas fa-thumbs-up"></i></div>
                    <p class="bullet-text">Benefícios e Mitos</p>
                </div>
                <div class="bullet-item" style="animation-delay: 0.4s;">
                    <div class="bullet-icon"><i class="fas fa-flask"></i></div>
                    <p class="bullet-text">Pytest: o que é, instalação e uso</p>
                </div>
                <div class="bullet-item" style="animation-delay: 0.5s;">
                    <div class="bullet-icon"><i class="fas fa-laptop-code"></i></div>
                    <p class="bullet-text">Live coding: <strong>eh_maior_de_idade</strong></p>
                </div>
                <div class="bullet-item" style="animation-delay: 0.6s;">
                    <div class="bullet-icon"><i class="fas fa-tools"></i></div>
                    <p class="bullet-text">Ferramentas: Coverage e Mock</p>
                </div>
                <div class="bullet-item" style="animation-delay: 0.7s;">
                    <div class="bullet-icon"><i class="fas fa-puzzle-piece"></i></div>
                    <p class="bullet-text">Desafio Prático: <strong>FizzBuzz com TDD</strong></p>
                </div>
                <div class="bullet-item" style="animation-delay: 0.8s;">
                    <div class="bullet-icon"><i class="fas fa-check-double"></i></div>
                    <p class="bullet-text">Boas práticas, avaliação e próximos passos</p>
                </div>
            </div>
        </div>
        <div class="h-3 w-full bg-slate-200">
            <div class="h-full bg-blue-600" style="width: 15%;"></div>
        </div>
    </div>

    <script>
        function scaleSlide() {
            const container = document.getElementById('slide');
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const slideWidth = 1280;
            const slideHeight = 720;
            const scale = Math.min(windowWidth / slideWidth, windowHeight / slideHeight);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleSlide);
        window.addEventListener('load', scaleSlide);
    </script>
</body>
</html>
