<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Capa - Aula 06</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&amp;family=Roboto:wght@300;400;500&amp;display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
        }

        /* Geometric decorations */
        .decorative-circle-1 {
            position: absolute;
            width: 40vw;
            height: 40vw;
            top: -10vw;
            right: -5vw;
            border-radius: 50%;
            background-color: rgba(59, 130, 246, 0.08);
            z-index: 1;
            pointer-events: none;
        }

        .decorative-circle-2 {
            position: absolute;
            width: 30vw;
            height: 30vw;
            bottom: -5vw;
            left: -5vw;
            border-radius: 50%;
            background-color: rgba(59, 130, 246, 0.05);
            z-index: 1;
            pointer-events: none;
        }

        .accent-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 100%;
            background-color: #3b82f6;
            z-index: 50;
        }

        .code-pattern {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 40%;
            background-image: radial-gradient(#3b82f6 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.05;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="accent-bar"></div>
        <div class="decorative-circle-1"></div>
        <div class="decorative-circle-2"></div>
        <div class="code-pattern"></div>
        
        <div class="z-20 flex flex-col justify-center h-full px-24 w-full relative">
            
            <div class="mb-12 border-l-4 border-blue-500 pl-6 py-1">
                <p class="text-blue-300 text-xl font-bold tracking-wide uppercase mb-1 font-['Montserrat']">Faculdade de Tecnologia do Senac (FATESE)</p>
                <p class="text-gray-400 text-lg">Curso: Análise e Desenvolvimento de Sistemas</p>
            </div>

            <div class="mb-16 relative">
                <p class="text-3xl text-blue-400 font-light mb-4 tracking-wide">Disciplina: Qualidade e Teste de Software</p>
                <h1 class="text-8xl font-extrabold font-['Montserrat'] leading-tight text-white drop-shadow-lg">
                    Aula 06<br />
                    <span class="text-transparent bg-clip-text text-blue-500" style="-webkit-text-stroke: 1px #3b82f6;">Testes Unitários</span> 
                    <span class="text-white font-light">com Pytest</span>
                </h1>
                <div class="w-40 h-3 bg-blue-500 mt-8 rounded-full"></div>
            </div>

            <div class="flex items-center space-x-8 bg-slate-800 bg-opacity-60 p-8 rounded-xl w-fit backdrop-blur-md border border-slate-700 shadow-xl">
                <div class="flex-shrink-0">
                    <div class="w-24 h-24 rounded-full bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center text-4xl font-bold text-white shadow-lg border-2 border-slate-600">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
                <div>
                    <p class="text-2xl font-bold text-white font-['Montserrat']">Prof. Carlos Bruno Oliveira Lopes</p>
                    <div class="grid grid-cols-1 gap-2 mt-3 text-base text-gray-300">
                        <div class="flex items-center group cursor-pointer transition-colors hover:text-blue-400">
                            <div class="w-6 flex justify-center"><i class="fas fa-envelope text-blue-500 group-hover:text-blue-300"></i></div>
                            <span class="ml-2">carlos.lopes@am.senac.br</span>
                        </div>
                        <div class="flex items-center group cursor-pointer transition-colors hover:text-blue-400">
                            <div class="w-6 flex justify-center"><i class="fab fa-github text-blue-500 group-hover:text-blue-300"></i></div>
                            <span class="ml-2">github.com/carlosbrunocb</span>
                        </div>
                        <div class="flex items-center group cursor-pointer transition-colors hover:text-blue-400">
                            <div class="w-6 flex justify-center"><i class="fab fa-linkedin text-blue-500 group-hover:text-blue-300"></i></div>
                            <span class="ml-2">in/carlosbruno-lopes</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute right-10 bottom-10 text-slate-800 opacity-30 transform rotate-12 z-10 pointer-events-none">
            <i class="fab fa-python text-[25vh]"></i>
        </div>
    </div>
</body>
</html>
