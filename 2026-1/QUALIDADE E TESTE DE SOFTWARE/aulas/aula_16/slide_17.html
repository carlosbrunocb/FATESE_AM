<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Encerramento e Contato</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="17 Encerramento">

        <!-- Decorative background elements -->
        <div data-object="true" data-object-type="shape"
            style="position: absolute; left: 0px; top: 0px; width: 1920px; height: 1080px; background: radial-gradient(circle at 20% 80%, #0e1e2f 0%, #0b0f19 80%); z-index: 1;">
        </div>

        <div data-object="true" data-object-type="shape"
            style="position: absolute; left: 200px; top: 500px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%); border-radius: 50%; filter: blur(50px); z-index: 2;">
        </div>
        <div data-object="true" data-object-type="shape"
            style="position: absolute; left: 1200px; top: 100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(50px); z-index: 2;">
        </div>

        <!-- Centered Closing -->
        <div data-object="true" data-object-type="textbox"
            style="position: absolute; left: 200px; top: 220px; width: 1520px; height: 100px; text-align: center; z-index: 10;">
            <span class="mono"
                style="font-size: 20px; color: var(--accent-cyan-bright); font-weight: 700; letter-spacing: 3px; text-transform: uppercase;">MUITO
                OBRIGADO</span>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position: absolute; left: 200px; top: 290px; width: 1520px; height: 260px; text-align: center; z-index: 10;">
            <h1
                style="margin: 0; font-size: 72px; font-weight: 800; line-height: 1.15; color: var(--text-main); letter-spacing: -1px;">
                A Qualidade é uma Jornada de<br>
                <span
                    style="background: linear-gradient(to right, var(--accent-cyan-bright), var(--accent-green-bright)); background-clip: text; -webkit-text-fill-color: transparent;">Colaboração
                    e Engenharia Contínua</span>
            </h1>
        </div>

        <!-- Cards container using precise coordinates -->
        <div class="card glow-green" data-object="true" data-object-type="shape"
            style="position: absolute; left: 460px; top: 580px; width: 1000px; height: 280px; background-color: rgba(30, 41, 59, 0.4); border-color: rgba(16, 185, 129, 0.3); padding: 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
            <div style="font-size: 32px; font-weight: 800; color: var(--text-main);">Prof. Carlos Bruno Oliveira Lopes
            </div>
            <div style="font-size: 20px; color: var(--accent-cyan-bright); margin-top: 10px;" class="mono">Análise e
                Desenvolvimento de Sistemas (ADS)</div>

            <div style="margin-top: 25px; border-top: 1px solid var(--border-slate); padding-top: 20px; width: 80%; display: flex; justify-content: space-around; font-size: 18px; color: var(--text-muted);"
                class="mono">
                <div>Email: <strong style="color: var(--text-main);">carlos.lopes@am.senac.br</strong></div>
                <div>LinkedIn: <strong style="color: var(--text-main);">in/carlosbruno-lopes</strong></div>
            </div>
        </div>

        <!-- Institution block centered at bottom -->
        <div data-object="true" data-object-type="textbox"
            style="position: absolute; left: 460px; top: 900px; width: 1000px; height: 100px; text-align: center; z-index: 10;">
            <div style="font-size: 18px; font-weight: 700; color: var(--text-main); letter-spacing: 2px;">SENAC FATESE
            </div>
            <div style="font-size: 15px; color: var(--text-muted); margin-top: 4px;">Faculdade de Tecnologia do Senac
            </div>
        </div>

    </div>
</body>

</html>
