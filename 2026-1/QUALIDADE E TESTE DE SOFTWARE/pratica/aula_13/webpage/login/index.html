<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Login Local</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Login do Sistema</h1>

        <input
            type="text"
            id="usuario"
            placeholder="Usuário">

        <input
            type="password"
            id="senha"
            placeholder="Senha">

        <button
            id="login-btn"
            onclick="fazerLogin()">

            Entrar
        </button>

        <div id="mensagem"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
