<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Capa - Introdução ao Cisco Packet Tracer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            background-color: #f0f4f8;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #00264d;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* Decorative Network Background */
        .network-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.1;
            background-image:
                radial-gradient(circle at 20% 20%, #ffffff 2px, transparent 2.5px),
                radial-gradient(circle at 80% 50%, #ffffff 2px, transparent 2.5px),
                radial-gradient(circle at 40% 80%, #ffffff 2px, transparent 2.5px),
                radial-gradient(circle at 90% 10%, #ffffff 2px, transparent 2.5px);
            background-size: 100px 100px;
        }

        .network-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Accent Bar */
        .accent-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 12px;
            background-color: #00bceb;
            z-index: 10;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 8vw;
            padding-right: 5vw;
            z-index: 5;
        }

        .institution-tag {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            color: #00bceb;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            margin-top: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            margin-top: 1rem;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle-box {
            border-left: 4px solid #00bceb;
            padding-left: 20px;
            margin-bottom: 3rem;
        }

        .course-info {
            font-size: clamp(1.4rem, 2.5vw, 1.8rem);
            font-weight: 300;
            color: #e0e7ff;
            margin-bottom: 0.5rem;
        }

        .discipline-info {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            font-weight: 400;
            color: #94a3b8;
        }

        .footer-info {
            margin-top: auto;
            padding-bottom: 4vh;
            display: flex;
            flex-wrap: wrap;
            gap: 2vw;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            width: 90%;
        }

        .prof-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: clamp(0.9rem, 1.5vw, 1rem);
            font-family: 'Roboto', sans-serif;
        }

        .prof-card i {
            color: #00bceb;
            font-size: 1.2rem;
        }

        .prof-card span, .prof-card p {
            color: #f1f5f9;
            margin: 0;
        }

        /* SVG Shape Decoration */
        .shape-deco {
            position: absolute;
            right: -5vw;
            bottom: -5vh;
            width: 30vw;
            height: 30vw;
            max-width: 400px;
            max-height: 400px;
            opacity: 0.05;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="network-bg"></div>
        <div class="accent-bar"></div>
        
        <svg class="network-lines" fill="none" width="100%" height="100%" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <path d="M1100 100 L 1200 200 L 1150 350" fill="none" stroke="#00bceb" stroke-opacity="0.3" stroke-width="1"></path>
            <circle cx="1100" cy="100" fill="#00bceb" fill-opacity="0.5" r="4"></circle>
            <circle cx="1200" cy="200" fill="#00bceb" fill-opacity="0.5" r="4"></circle>
            <circle cx="1150" cy="350" fill="#00bceb" fill-opacity="0.5" r="4"></circle>
            <path d="M50 600 L 150 500 L 300 550" fill="none" stroke="#00bceb" stroke-opacity="0.3" stroke-width="1"></path>
            <circle cx="50" cy="600" fill="#00bceb" fill-opacity="0.5" r="4"></circle>
            <circle cx="150" cy="500" fill="#00bceb" fill-opacity="0.5" r="4"></circle>
            <circle cx="300" cy="550" fill="#00bceb" fill-opacity="0.5" r="4"></circle>
        </svg>

        <svg class="shape-deco" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M44.7,-76.4C58.9,-69.2,71.8,-59.1,81.6,-46.6C91.4,-34.1,98.1,-19.2,95.8,-5.3C93.5,8.6,82.2,21.5,71.2,32.4C60.2,43.3,49.5,52.2,37.8,60.8C26.1,69.4,13.4,77.7,-0.6,78.7C-14.6,79.7,-27.9,73.4,-40.3,65.3C-52.7,57.2,-64.2,47.3,-72.3,35.2C-80.4,23.1,-85.1,8.8,-83.4,-4.8C-81.7,-18.4,-73.6,-31.3,-63.5,-41.8C-53.4,-52.3,-41.3,-60.4,-28.7,-68.6C-16.1,-76.8,-3,-85.1,10.6,-84.5C24.2,-83.9,40,-74.4,44.7,-76.4Z" fill="#FFFFFF" transform="translate(100 100)"></path>
        </svg>

        <div class="content-wrapper">
            <div class="institution-tag">
                <i class="fas fa-university"></i>
                <p>Faculdade de Tecnologia do Senac (FATESE)</p>
            </div>
            <h1 class="main-title">Prática I – Introdução ao<br />Cisco Packet Tracer</h1>
            <div class="subtitle-box">
                <p class="course-info">Curso: Análise e Desenvolvimento de Sistemas</p>
                <p class="discipline-info">Disciplina: Redes de Computadores</p>
            </div>
            <div class="footer-info">
                <div class="prof-card">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <p><strong>Prof.</strong> Carlos Bruno Oliveira Lopes</p>
                </div>
                <div class="prof-card">
                    <i class="fas fa-envelope"></i>
                    <p>carlos.lopes@am.senac.br</p>
                </div>
                <div class="prof-card">
                    <i class="fab fa-github"></i>
                    <p>github.com/carlosbrunocb</p>
                </div>
                <div class="prof-card">
                    <i class="fab fa-linkedin"></i>
                    <p>in/carlosbruno-lopes/</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
