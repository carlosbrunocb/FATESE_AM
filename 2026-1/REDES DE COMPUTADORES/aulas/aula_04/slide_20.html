<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Práticas Guiadas</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            background-color: #00264d;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #00264d;
            display: flex;
            color: white;
            overflow: hidden;
        }

        .left-section {
            width: 40%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5vw;
            background-color: #003366;
            border-right: 4px solid #00bceb;
            z-index: 2;
        }

        .section-icon {
            font-size: 5rem;
            color: #00bceb;
            margin-bottom: 1.5rem;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 8vh, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #cbd5e1;
            font-weight: 300;
        }

        .right-section {
            width: 60%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5vw;
            position: relative;
            z-index: 2;
        }

        .topic-item {
            display: flex;
            align-items: center;
            margin-bottom: 4vh;
            font-size: clamp(1.2rem, 3vh, 1.8rem);
            color: #e2e8f0;
        }

        .topic-bullet {
            width: 15px;
            height: 15px;
            background-color: #00bceb;
            border-radius: 50%;
            margin-right: 25px;
            box-shadow: 0 0 10px rgba(0, 188, 235, 0.5);
            flex-shrink: 0;
        }

        .topic-text {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            width: 100%;
        }

        .circuit-deco {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 30vw;
            height: 30vw;
            opacity: 0.15;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="left-section">
            <div class="section-icon"><i class="fas fa-laptop-code"></i></div>
            <h1 class="main-title">Práticas<br />Guiadas</h1>
            <p class="subtitle">Laboratório Virtual Cisco Packet Tracer</p>
        </div>
        <div class="right-section">
            <ul class="topic-list">
                <li class="topic-item">
                    <div class="topic-bullet"></div>
                    <p class="topic-text">Exemplo 1: Conexão Ponto a Ponto (Crossover)</p>
                </li>
                <li class="topic-item">
                    <div class="topic-bullet"></div>
                    <p class="topic-text">Exemplo 2: Rede em Estrela com Switch</p>
                </li>
                <li class="topic-item">
                    <div class="topic-bullet"></div>
                    <p class="topic-text">Validação: Ping, ARP e Modo Simulation</p>
                </li>
            </ul>
            <svg class="circuit-deco" viewbox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 400 L 100 300 L 100 200 L 200 100 L 400 100" fill="none" stroke="#00bceb" stroke-width="2"></path>
                <circle cx="100" cy="300" fill="#00bceb" r="5"></circle>
                <circle cx="200" cy="100" fill="#00bceb" r="5"></circle>
            </svg>
        </div>
    </div>
</body>
</html>
