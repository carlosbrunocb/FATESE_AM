<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Capa — Aula 04</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="01 Capa"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--ink);">

        <!-- Background grid -->
        <div data-object="true" data-object-type="shape" class="grid-bg"
            style="position:absolute; left:0; top:0; width:1920px; height:1080px; z-index:1; opacity:.5;"></div>

        <!-- Emerald accent bar -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:24px; height:1080px; background:var(--emerald); z-index:1;">
        </div>

        <!-- Amber dot cluster (top-right) -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:1640px; top:80px; width:200px; height:200px; z-index:1;">
            <svg width="200" height="200" viewBox="0 0 200 200">
                <circle cx="40" cy="40" r="6" fill="#F59E0B" />
                <circle cx="80" cy="40" r="6" fill="#F59E0B" opacity=".7" />
                <circle cx="120" cy="40" r="6" fill="#F59E0B" opacity=".4" />
                <circle cx="40" cy="80" r="6" fill="#10B981" opacity=".5" />
                <circle cx="80" cy="80" r="6" fill="#10B981" />
                <circle cx="120" cy="80" r="6" fill="#10B981" opacity=".7" />
                <circle cx="160" cy="80" r="6" fill="#10B981" opacity=".4" />
                <circle cx="80" cy="120" r="6" fill="#3B82F6" opacity=".5" />
                <circle cx="120" cy="120" r="6" fill="#3B82F6" />
            </svg>
        </div>

        <!-- Course tag -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:140px; width:800px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:22px; color:var(--emerald); letter-spacing:.2em; text-transform:uppercase;">
                // gestão ágil de projetos — aula 04</div>
        </div>

        <!-- Big title -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:240px; width:1500px; z-index:10;">
            <div
                style="font-family:var(--f-display); font-weight:700; font-size:148px; line-height:.95; color:#FFFFFF; letter-spacing:-.03em;">
                Métricas Ágeis<br>
                <span style="color:var(--emerald);">&amp;</span> Sprint Review
            </div>
        </div>

        <!-- Subtitle -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:600px; width:1500px; z-index:10;">
            <div
                style="font-family:var(--f-display); font-weight:400; font-size:44px; line-height:1.2; color:var(--paper-2);">
                Medindo e Entregando Valor — Lead Time, Cycle Time<br>
                e a demonstração que muda a conversa com o cliente.
            </div>
        </div>

        <!-- Divider -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:120px; top:830px; width:120px; height:4px; background:var(--amber); z-index:5;">
        </div>

        <!-- Professor block -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:870px; width:1500px; z-index:10;">
            <div style="font-family:var(--f-body); font-size:22px; color:var(--muted); margin-bottom:6px;">Prof. </div>
            <div style="font-family:var(--f-display); font-size:34px; font-weight:600; color:#FFFFFF;">Carlos Bruno
                Oliveira Lopes</div>
            <div style="font-family:var(--f-mono); font-size:18px; color:var(--paper-2); margin-top:10px;">FATESE ·
                Análise e Desenvolvimento de Sistemas</div>
        </div>

    </div>
</body>

</html>
