<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Métricas de Fluxo</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="08 Métricas Fluxo intro"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--emerald-d);">

        <!-- Subtle dot grid -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:1920px; height:1080px; background-image:radial-gradient(rgba(255,255,255,.08) 2px, transparent 2px); background-size:40px 40px; z-index:1;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:300px; width:1500px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:22px; color:var(--amber); letter-spacing:.25em; text-transform:uppercase;">
                // parte 02 · métricas de fluxo</div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:380px; width:1680px; z-index:10;">
            <div
                style="font-family:var(--f-display); font-weight:700; font-size:200px; line-height:.9; color:#FFFFFF; letter-spacing:-.04em;">
                Lead Time<br>
                <span style="color:var(--amber);">vs.</span><br>
                Cycle Time
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:980px; width:1500px; z-index:10;">
            <div style="font-family:var(--f-display); font-size:30px; color:rgba(255,255,255,.85);">Os dois relógios que
                todo time ágil precisa entender.</div>
        </div>

    </div>
</body>

</html>
