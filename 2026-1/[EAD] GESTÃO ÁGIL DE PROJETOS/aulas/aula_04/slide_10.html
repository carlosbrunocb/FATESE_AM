<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Linha do tempo da Issue</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="10 Linha do tempo"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--paper);">

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:1920px; height:8px; background:var(--ink); z-index:1;"></div>
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:8px; width:480px; height:4px; background:var(--emerald); z-index:1;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:80px; width:1680px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:18px; color:var(--emerald-d); letter-spacing:.2em; text-transform:uppercase;">
                // visualizando os dois tempos</div>
            <div
                style="font-family:var(--f-display); font-weight:600; font-size:74px; line-height:1; color:var(--ink); letter-spacing:-.02em; margin-top:14px;">
                A jornada de uma tarefa</div>
        </div>

        <!-- Timeline -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:120px; top:340px; width:1680px; height:560px; background:#FFFFFF; border:1.5px solid var(--line); z-index:1;">
        </div>

        <!-- Timeline SVG diagram -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:160px; top:390px; width:1600px; height:470px; z-index:5;">
            <svg width="1600" height="470" viewBox="0 0 1600 470" xmlns="http://www.w3.org/2000/svg">
                <!-- Track -->
                <rect x="60" y="180" width="1480" height="60" fill="#E9E6DD" rx="4" />
                <!-- Backlog segment (wait) -->
                <rect x="60" y="180" width="600" height="60" fill="#8A95A3" opacity=".4" rx="4" />
                <!-- In Progress segment (work) -->
                <rect x="660" y="180" width="500" height="60" fill="#F59E0B" rx="4" />
                <!-- Review/QA segment -->
                <rect x="1160" y="180" width="200" height="60" fill="#3B82F6" opacity=".7" rx="4" />
                <!-- Done segment -->
                <rect x="1360" y="180" width="180" height="60" fill="#10B981" rx="4" />

                <!-- Section labels inside track -->
                <text x="360" y="218" text-anchor="middle" font-family="Inter" font-size="20" font-weight="600"
                    fill="#0E1116">Backlog (esperando)</text>
                <text x="910" y="218" text-anchor="middle" font-family="Inter" font-size="20" font-weight="700"
                    fill="#FFFFFF">In Progress (desenvolvendo)</text>
                <text x="1260" y="218" text-anchor="middle" font-family="Inter" font-size="18" font-weight="700"
                    fill="#FFFFFF">Review</text>
                <text x="1450" y="218" text-anchor="middle" font-family="Inter" font-size="20" font-weight="700"
                    fill="#FFFFFF">Done</text>

                <!-- Milestone dots -->
                <circle cx="60" cy="210" r="14" fill="#0E1116" />
                <circle cx="660" cy="210" r="14" fill="#0E1116" />
                <circle cx="1540" cy="210" r="14" fill="#0E1116" />

                <!-- Milestone labels (top) -->
                <text x="60" y="155" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#8A95A3"
                    font-weight="500">CRIADA</text>
                <text x="60" y="135" text-anchor="middle" font-family="Inter" font-size="20" font-weight="700"
                    fill="#0E1116">01/03</text>

                <text x="660" y="155" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#8A95A3"
                    font-weight="500">INÍCIO</text>
                <text x="660" y="135" text-anchor="middle" font-family="Inter" font-size="20" font-weight="700"
                    fill="#0E1116">10/03</text>

                <text x="1540" y="155" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#8A95A3"
                    font-weight="500">CONCLUSÃO</text>
                <text x="1540" y="135" text-anchor="middle" font-family="Inter" font-size="20" font-weight="700"
                    fill="#0E1116">15/03</text>

                <!-- Cycle Time bracket (bottom) -->
                <line x1="660" y1="280" x2="660" y2="310" stroke="#B45309" stroke-width="2" />
                <line x1="1540" y1="280" x2="1540" y2="310" stroke="#B45309" stroke-width="2" />
                <line x1="660" y1="310" x2="1540" y2="310" stroke="#B45309" stroke-width="2" />
                <text x="1100" y="345" text-anchor="middle" font-family="Space Grotesk" font-size="22" font-weight="600"
                    fill="#B45309">CYCLE TIME = 5 dias</text>

                <!-- Lead Time bracket (further bottom) -->
                <line x1="60" y1="380" x2="60" y2="410" stroke="#047857" stroke-width="2" />
                <line x1="1540" y1="380" x2="1540" y2="410" stroke="#047857" stroke-width="2" />
                <line x1="60" y1="410" x2="1540" y2="410" stroke="#047857" stroke-width="2" />
                <text x="800" y="445" text-anchor="middle" font-family="Space Grotesk" font-size="22" font-weight="600"
                    fill="#047857">LEAD TIME = 14 dias</text>

                <!-- Connector dotted lines from milestones to brackets -->
                <line x1="660" y1="240" x2="660" y2="280" stroke="#B45309" stroke-width="1.5" stroke-dasharray="3,3" />
                <line x1="1540" y1="240" x2="1540" y2="280" stroke="#B45309" stroke-width="1.5"
                    stroke-dasharray="3,3" />
                <line x1="60" y1="240" x2="60" y2="380" stroke="#047857" stroke-width="1.5" stroke-dasharray="3,3" />
                <line x1="1540" y1="310" x2="1540" y2="380" stroke="#047857" stroke-width="1.5"
                    stroke-dasharray="3,3" />
            </svg>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:1010px; width:1680px; z-index:10;">
            <div
                style="display:flex; justify-content:space-between; font-family:var(--f-mono); font-size:16px; color:var(--muted);">
                <span>Gestão Ágil de Projetos · Prof. Carlos Bruno</span>
                <span>10 / 34</span>
            </div>
        </div>

    </div>
</body>

</html>
