<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Sprint Review intro</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="16 Review intro"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--amber-d);">

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:1920px; height:1080px; background-image:radial-gradient(rgba(255,255,255,.08) 2px, transparent 2px); background-size:40px 40px; z-index:1;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:320px; width:1500px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:22px; color:#FFFFFF; letter-spacing:.25em; text-transform:uppercase;">
                // parte 03 · sprint review</div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:400px; width:1680px; z-index:10;">
            <div
                style="font-family:var(--f-display); font-weight:700; font-size:220px; line-height:.9; color:#FFFFFF; letter-spacing:-.04em;">
                Sprint<br>
                <span style="color:var(--ink);">Review.</span>
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:920px; width:1500px; z-index:10;">
            <div style="font-family:var(--f-display); font-size:34px; color:rgba(255,255,255,.95); font-weight:500;">A
                cerimônia onde <strong style="color:var(--ink);">código</strong> vira <strong
                    style="color:var(--ink);">valor de negócio</strong>.</div>
        </div>

    </div>
</body>

</html>
