<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Anatomia da Sprint Review</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="18 Anatomia Review"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--paper);">

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:1920px; height:8px; background:var(--ink); z-index:1;"></div>
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:8px; width:480px; height:4px; background:var(--amber); z-index:1;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:80px; width:1680px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:18px; color:var(--amber-d); letter-spacing:.2em; text-transform:uppercase;">
                // estrutura da cerimônia</div>
            <div
                style="font-family:var(--f-display); font-weight:600; font-size:74px; line-height:1; color:var(--ink); letter-spacing:-.02em; margin-top:12px;">
                Anatomia de uma boa Review</div>
        </div>

        <!-- Flowchart -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:120px; top:320px; width:1680px; height:620px; background:#FFFFFF; border:1.5px solid var(--line); z-index:1;">
        </div>

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:160px; top:360px; width:1600px; height:540px; z-index:5;">
            <svg width="1600" height="540" viewBox="0 0 1600 540" xmlns="http://www.w3.org/2000/svg">
                <!-- Steps -->
                <g>
                    <rect x="0" y="40" width="280" height="180" fill="#10B981" rx="8" />
                    <text x="140" y="90" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#FFFFFF"
                        font-weight="700" letter-spacing="2">PASSO 1</text>
                    <text x="140" y="130" text-anchor="middle" font-family="Space Grotesk" font-size="22" fill="#FFFFFF"
                        font-weight="700">Abertura</text>
                    <text x="140" y="165" text-anchor="middle" font-family="Inter" font-size="15" fill="#FFFFFF">Sprint
                        Goal +</text>
                    <text x="140" y="185" text-anchor="middle" font-family="Inter" font-size="15"
                        fill="#FFFFFF">stakeholders</text>
                </g>

                <g>
                    <rect x="330" y="40" width="280" height="180" fill="#F59E0B" rx="8" />
                    <text x="470" y="90" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#FFFFFF"
                        font-weight="700" letter-spacing="2">PASSO 2</text>
                    <text x="470" y="130" text-anchor="middle" font-family="Space Grotesk" font-size="22" fill="#FFFFFF"
                        font-weight="700">Demonstração</text>
                    <text x="470" y="165" text-anchor="middle" font-family="Inter" font-size="15" fill="#FFFFFF">Tela
                        compartilhada</text>
                    <text x="470" y="185" text-anchor="middle" font-family="Inter" font-size="15" fill="#FFFFFF">+
                        software rodando</text>
                </g>

                <g>
                    <rect x="660" y="40" width="280" height="180" fill="#0E1116" rx="8" />
                    <text x="800" y="90" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#F59E0B"
                        font-weight="700" letter-spacing="2">PASSO 3</text>
                    <text x="800" y="130" text-anchor="middle" font-family="Space Grotesk" font-size="22" fill="#FFFFFF"
                        font-weight="700">Feedback</text>
                    <text x="800" y="165" text-anchor="middle" font-family="Inter" font-size="15"
                        fill="#FFFFFF">Perguntas, dúvidas,</text>
                    <text x="800" y="185" text-anchor="middle" font-family="Inter" font-size="15" fill="#FFFFFF">ajustes
                        do cliente</text>
                </g>

                <g>
                    <rect x="990" y="40" width="280" height="180" fill="#F59E0B" rx="8" />
                    <text x="1130" y="90" text-anchor="middle" font-family="JetBrains Mono" font-size="14"
                        fill="#FFFFFF" font-weight="700" letter-spacing="2">PASSO 4</text>
                    <text x="1130" y="130" text-anchor="middle" font-family="Space Grotesk" font-size="22"
                        fill="#FFFFFF" font-weight="700">Backlog</text>
                    <text x="1130" y="165" text-anchor="middle" font-family="Inter" font-size="15"
                        fill="#FFFFFF">Repriorizar próximas</text>
                    <text x="1130" y="185" text-anchor="middle" font-family="Inter" font-size="15"
                        fill="#FFFFFF">entregas em conjunto</text>
                </g>

                <g>
                    <rect x="1320" y="40" width="280" height="180" fill="#10B981" rx="8" />
                    <text x="1460" y="90" text-anchor="middle" font-family="JetBrains Mono" font-size="14"
                        fill="#FFFFFF" font-weight="700" letter-spacing="2">PASSO 5</text>
                    <text x="1460" y="130" text-anchor="middle" font-family="Space Grotesk" font-size="22"
                        fill="#FFFFFF" font-weight="700">Fechamento</text>
                    <text x="1460" y="165" text-anchor="middle" font-family="Inter" font-size="15"
                        fill="#FFFFFF">Próximos passos +</text>
                    <text x="1460" y="185" text-anchor="middle" font-family="Inter" font-size="15" fill="#FFFFFF">data
                        da próxima</text>
                </g>

                <!-- Arrows -->
                <path d="M 280 130 L 330 130" stroke="#0E1116" stroke-width="3" marker-end="url(#arrow)" />
                <path d="M 610 130 L 660 130" stroke="#0E1116" stroke-width="3" marker-end="url(#arrow)" />
                <path d="M 940 130 L 990 130" stroke="#0E1116" stroke-width="3" marker-end="url(#arrow)" />
                <path d="M 1270 130 L 1320 130" stroke="#0E1116" stroke-width="3" marker-end="url(#arrow)" />

                <defs>
                    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                        <path d="M 0 0 L 9 3 L 0 6 z" fill="#0E1116" />
                    </marker>
                </defs>

                <!-- Key principle bar -->
                <rect x="0" y="320" width="1600" height="180" fill="#F4F2EC" stroke="#2A323D" stroke-width="1.5" />
                <text x="40" y="365" font-family="JetBrains Mono" font-size="15" fill="#8A95A3"
                    letter-spacing="2">PRINCÍPIO CENTRAL</text>
                <text x="40" y="420" font-family="Space Grotesk" font-size="38" fill="#0E1116" font-weight="600">Mostre.
                    Não conte.</text>
                <text x="40" y="465" font-family="Inter" font-size="22" fill="#2A323D">Cada item entregue ganha 2–3
                    minutos de demonstração real — não slide, não diagrama, software de verdade rodando.</text>
            </svg>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:1010px; width:1680px; z-index:10;">
            <div
                style="display:flex; justify-content:space-between; font-family:var(--f-mono); font-size:16px; color:var(--muted);">
                <span>Gestão Ágil de Projetos · Prof. Carlos Bruno</span>
                <span>18 / 34</span>
            </div>
        </div>

    </div>
</body>

</html>
