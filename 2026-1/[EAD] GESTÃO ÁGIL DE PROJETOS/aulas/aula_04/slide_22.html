<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Prática GitHub</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="22 Prática GitHub"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--ink);">

        <div data-object="true" data-object-type="shape" class="grid-bg"
            style="position:absolute; left:0; top:0; width:1920px; height:1080px; z-index:1; opacity:.4;"></div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:320px; width:1500px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:22px; color:var(--emerald); letter-spacing:.25em; text-transform:uppercase;">
                // parte 04 · prática guiada</div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:400px; width:1680px; z-index:10;">
            <div
                style="font-family:var(--f-display); font-weight:700; font-size:170px; line-height:.9; color:#FFFFFF; letter-spacing:-.04em;">
                Calculando<br>
                <span style="color:var(--emerald);">no GitHub Projects.</span>
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:920px; width:1500px; z-index:10;">
            <div style="font-family:var(--f-display); font-size:34px; color:var(--paper-2); font-weight:500;">Vamos
                abrir uma Issue real, ler o histórico e fazer a conta juntos.</div>
        </div>

    </div>
</body>

</html>
