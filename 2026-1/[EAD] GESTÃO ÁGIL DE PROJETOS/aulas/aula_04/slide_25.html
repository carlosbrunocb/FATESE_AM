<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Atividade 04</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="25 Atividade capa"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--ink);">

        <div data-object="true" data-object-type="shape" class="grid-bg"
            style="position:absolute; left:0; top:0; width:1920px; height:1080px; z-index:1; opacity:.4;"></div>

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:24px; height:1080px; background:var(--amber); z-index:1;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:280px; width:1500px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:22px; color:var(--amber); letter-spacing:.25em; text-transform:uppercase;">
                // atividade prática 04 · ava</div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:360px; width:1680px; z-index:10;">
            <div
                style="font-family:var(--f-display); font-weight:700; font-size:170px; line-height:.9; color:#FFFFFF; letter-spacing:-.04em;">
                Métricas de Fluxo<br>
                <span style="color:var(--amber);">+ Roteiro de Review</span>
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:790px; width:1680px; z-index:10;">
            <div
                style="font-family:var(--f-display); font-size:32px; color:var(--paper-2); font-weight:500; line-height:1.45;">
                Calcular Lead/Cycle Time de 3 Issues do Projeto Integrador<br>
                e escrever como vocês apresentariam essas entregas ao cliente.
            </div>
        </div>

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:120px; top:960px; width:80px; height:4px; background:var(--emerald); z-index:5;">
        </div>
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:980px; width:1500px; z-index:10;">
            <div style="font-family:var(--f-mono); font-size:18px; color:var(--paper-2);">Ferramenta: GitHub Projects ·
                Entrega: PDF no AVA</div>
        </div>

    </div>
</body>

</html>
