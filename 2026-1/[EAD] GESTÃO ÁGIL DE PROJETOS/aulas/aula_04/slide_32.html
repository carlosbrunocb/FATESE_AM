<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Fechamento do ciclo</title>
    <link rel="stylesheet" href="./assets/theme.css">
</head>

<body>
    <div class="slide-container" data-screen-label="32 Fechamento ciclo"
        style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--paper);">

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:0; width:1920px; height:8px; background:var(--ink); z-index:1;"></div>
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:0; top:8px; width:480px; height:4px; background:var(--emerald); z-index:1;">
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:80px; width:1680px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:18px; color:var(--emerald-d); letter-spacing:.2em; text-transform:uppercase;">
                // onde estamos no curso</div>
            <div
                style="font-family:var(--f-display); font-weight:600; font-size:62px; line-height:1.05; color:var(--ink); letter-spacing:-.02em; margin-top:12px;">
                Fechamento do ciclo ágil</div>
        </div>

        <!-- Cycle diagram -->
        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:120px; top:300px; width:1680px; height:660px; background:#FFFFFF; border:1.5px solid var(--line); z-index:1;">
        </div>

        <div data-object="true" data-object-type="shape"
            style="position:absolute; left:160px; top:340px; width:1600px; height:580px; z-index:5;">
            <svg width="1600" height="580" viewBox="0 0 1600 580" xmlns="http://www.w3.org/2000/svg">

                <!-- Center circle -->
                <circle cx="800" cy="290" r="100" fill="#0E1116" />
                <text x="800" y="280" text-anchor="middle" font-family="Space Grotesk" font-size="22" font-weight="600"
                    fill="#FFFFFF">Sprint</text>
                <text x="800" y="312" text-anchor="middle" font-family="Space Grotesk" font-size="22" font-weight="600"
                    fill="#10B981">Ágil</text>

                <!-- Four phases positioned around -->
                <!-- Top: Planning -->
                <g>
                    <circle cx="800" cy="90" r="70" fill="#3B82F6" />
                    <text x="800" y="85" text-anchor="middle" font-family="JetBrains Mono" font-size="12" fill="#FFFFFF"
                        letter-spacing="2">AULA 01</text>
                    <text x="800" y="108" text-anchor="middle" font-family="Space Grotesk" font-size="18"
                        font-weight="700" fill="#FFFFFF">Planejar</text>
                    <text x="800" y="40" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600"
                        fill="#0E1116">Backlog &amp; Sprint Planning</text>
                </g>

                <!-- Right: Execute -->
                <g>
                    <circle cx="1100" cy="290" r="70" fill="#F59E0B" />
                    <text x="1100" y="285" text-anchor="middle" font-family="JetBrains Mono" font-size="12"
                        fill="#FFFFFF" letter-spacing="2">AULA 02</text>
                    <text x="1100" y="308" text-anchor="middle" font-family="Space Grotesk" font-size="18"
                        font-weight="700" fill="#FFFFFF">Executar</text>
                    <text x="1200" y="294" text-anchor="start" font-family="Inter" font-size="16" font-weight="600"
                        fill="#0E1116">Daily &amp; Kanban</text>
                </g>

                <!-- Bottom: Inspect (Retro) -->
                <g>
                    <circle cx="800" cy="490" r="70" fill="#10B981" />
                    <text x="800" y="485" text-anchor="middle" font-family="JetBrains Mono" font-size="12"
                        fill="#FFFFFF" letter-spacing="2">AULA 03</text>
                    <text x="800" y="508" text-anchor="middle" font-family="Space Grotesk" font-size="18"
                        font-weight="700" fill="#FFFFFF">Refletir</text>
                    <text x="800" y="555" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600"
                        fill="#0E1116">Impedimentos &amp; Retrospectiva</text>
                </g>

                <!-- Left: Deliver Value (Aula 04 — atual) -->
                <g>
                    <circle cx="500" cy="290" r="80" fill="#B45309" stroke="#F59E0B" stroke-width="6" />
                    <text x="500" y="280" text-anchor="middle" font-family="JetBrains Mono" font-size="12"
                        fill="#FFFFFF" letter-spacing="2">AULA 04 · HOJE</text>
                    <text x="500" y="305" text-anchor="middle" font-family="Space Grotesk" font-size="20"
                        font-weight="700" fill="#FFFFFF">Entregar</text>
                    <text x="500" y="328" text-anchor="middle" font-family="Space Grotesk" font-size="16"
                        font-weight="600" fill="#FFFFFF">Valor</text>
                    <text x="400" y="294" text-anchor="end" font-family="Inter" font-size="16" font-weight="600"
                        fill="#0E1116">Métricas &amp; Review</text>
                </g>

                <!-- Connecting arrows (circle) -->
                <path d="M 800 165 A 200 200 0 0 1 1020 290" stroke="#8A95A3" stroke-width="2" fill="none"
                    stroke-dasharray="6,6" />
                <path d="M 1020 290 A 200 200 0 0 1 800 415" stroke="#8A95A3" stroke-width="2" fill="none"
                    stroke-dasharray="6,6" />
                <path d="M 800 415 A 200 200 0 0 1 580 290" stroke="#8A95A3" stroke-width="2" fill="none"
                    stroke-dasharray="6,6" />
                <path d="M 580 290 A 200 200 0 0 1 800 165" stroke="#8A95A3" stroke-width="2" fill="none"
                    stroke-dasharray="6,6" />

            </svg>
        </div>

        <!-- Side text -->
        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:1320px; top:380px; width:440px; z-index:10;">
            <div
                style="font-family:var(--f-mono); font-size:14px; color:var(--amber-d); letter-spacing:.2em; text-transform:uppercase;">
                Você concluiu</div>
            <div
                style="font-family:var(--f-display); font-size:38px; font-weight:600; color:var(--ink); margin-top:12px; line-height:1.15;">
                O ciclo ágil completo</div>
            <div
                style="font-family:var(--f-body); font-size:19px; color:var(--graphite); margin-top:20px; line-height:1.5;">
                Planejar → Executar → Refletir → <strong style="color:var(--amber-d);">Entregar Valor</strong>.<br><br>
                Agora você tem as 4 dimensões básicas de um time ágil maduro.
            </div>
        </div>

        <div data-object="true" data-object-type="textbox"
            style="position:absolute; left:120px; top:1010px; width:1680px; z-index:10;">
            <div
                style="display:flex; justify-content:space-between; font-family:var(--f-mono); font-size:16px; color:var(--muted);">
                <span>Gestão Ágil de Projetos · Prof. Carlos Bruno</span>
                <span>32 / 34</span>
            </div>
        </div>

    </div>
</body>

</html>
